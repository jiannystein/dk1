<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Practical AI in Healthcare — Workshop Deck</title><meta name='description' content='Non-repetitive hospital AI workshop deck with practical artifacts, demos, scenarios and trainer notes.'><style>:root{--paper:#fffdf7;--cream:#f6f1e7;--ink:#111827;--muted:#64748b;--line:#d8cdbb;--black:#111;--blue:#246bfe;--teal:#0f766e;--amber:#f59e0b;--red:#ef4444;--green:#16a34a;--violet:#7c3aed;--slate:#334155;--shadow:7px 7px 0 #111}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,Aptos,Segoe UI,Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 9% 8%,rgba(36,107,254,.12),transparent 28%),radial-gradient(circle at 91% 2%,rgba(15,118,110,.14),transparent 25%),linear-gradient(180deg,#fffaf1 0,var(--cream) 100%);overflow:hidden}.deck{height:100vh;display:grid;grid-template-rows:66px 1fr 60px}.top{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:2px solid var(--black);background:rgba(255,253,247,.94);backdrop-filter:blur(8px)}.brand{display:flex;gap:10px;align-items:center;font-weight:1000}.mark{width:40px;height:40px;border:2px solid var(--black);border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--teal));box-shadow:3px 3px 0 var(--black);color:#fff;display:grid;place-items:center}.tag{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.top button,.nav button,.drawer button{border:2px solid var(--black);border-radius:999px;background:#fff;padding:8px 12px;font-weight:900;box-shadow:2px 2px 0 var(--black);cursor:pointer}.stage{position:relative;overflow:hidden}.slide{position:absolute;inset:0;display:none;padding:22px}.slide.active{display:block;animation:in .22s ease}@keyframes in{from{opacity:.2;transform:translateX(20px)}to{opacity:1;transform:none}}.frame{height:100%;display:grid;grid-template-columns:minmax(0,1fr) minmax(430px,.86fr);gap:20px;border:2px solid var(--black);border-radius:28px;background:rgba(255,253,247,.97);box-shadow:var(--shadow);padding:22px}.main{min-width:0;overflow:auto;padding-right:4px}.kicker{display:inline-flex;border:2px solid var(--black);border-radius:999px;background:var(--accent);color:#fff;padding:8px 12px;font-size:12px;font-weight:1000;box-shadow:3px 3px 0 var(--black);text-transform:uppercase;letter-spacing:.06em}h1{font-family:Georgia,Times New Roman,serif;font-size:clamp(34px,4vw,58px);line-height:.96;letter-spacing:-.04em;margin:14px 0 10px}.lead{font-size:20px;line-height:1.32;color:#2d3748;margin:0 0 12px}.block{border:1.5px solid var(--line);border-radius:16px;background:#fff;padding:13px 15px;margin:9px 0;box-shadow:0 6px 16px rgba(15,23,42,.04)}.block h3{margin:0 0 7px;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent)}.block p,.block li{font-size:15.5px;line-height:1.38;margin:0}.block ul{margin:0;padding-left:18px}.scenario{background:#fff7e6;border-color:#f4d28b}.demo{background:#eef7ff;border-color:#b6d8ff}.practice{background:#f0fdf4;border-color:#b9e8c5}.take{background:#111827;color:#fff;border:2px solid #111827}.take h3{color:#93c5fd}.take p{color:#f8fafc;font-weight:780}.side{display:grid;grid-template-rows:1fr;min-height:0}.artifact{border:2px solid var(--black);border-radius:22px;background:#fff;box-shadow:5px 5px 0 var(--black);padding:15px;overflow:auto}.artifact.image{padding:0;background:#111827}.artifact.image img{width:100%;height:100%;object-fit:cover;display:block}.artifact h2{font-size:19px;margin:0 0 10px}.artifact p{font-size:14.5px;line-height:1.35}.artifact table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}.artifact th,.artifact td{border:1px solid #d6d3ca;padding:8px;text-align:left;vertical-align:top}.artifact th{background:#f1f5f9;font-size:11px;text-transform:uppercase;letter-spacing:.06em}.artifact pre,.drawer pre{white-space:pre-wrap;background:#0b1220;color:#e5e7eb;border-radius:14px;padding:13px;font-size:12.5px;line-height:1.42;margin:0}.steps{display:grid;gap:9px}.step{border:1.5px solid var(--line);border-radius:14px;padding:10px;background:#fff}.step b{color:var(--accent)}.flow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.flow div{border:2px solid var(--black);border-radius:16px;padding:13px;background:#f8fafc;text-align:center;font-weight:900}.traffic{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.traffic div{border:2px solid var(--black);border-radius:18px;padding:15px;min-height:150px}.green{background:#dcfce7}.yellow{background:#fef3c7}.red{background:#fee2e2}.bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);background:rgba(255,253,247,.86);padding:10px 18px}.nav{display:flex;gap:7px;overflow:auto;max-width:74vw}.nav button{box-shadow:none;font-size:12px;color:var(--c);border-color:var(--c)}.counter{font-weight:900;color:var(--muted);font-variant-numeric:tabular-nums}.notes{position:fixed;right:18px;top:84px;width:min(540px,calc(100vw - 36px));max-height:72vh;overflow:auto;background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);padding:16px;display:none;z-index:20}.notes.open{display:block}.notes b{color:var(--teal)}.drawer{position:fixed;right:18px;top:84px;bottom:72px;width:min(650px,calc(100vw - 36px));background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);display:none;z-index:21;grid-template-rows:auto auto 1fr auto;overflow:hidden}.drawer.open{display:grid}.drawer header{background:#111827;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.drawer h2{margin:0}.drawer select{margin:14px;border:2px solid var(--black);border-radius:12px;padding:10px;font-weight:900}.drawer .actions{padding:0 14px 14px;display:flex;gap:10px}@media(max-width:1050px){body{overflow:auto}.deck{height:auto;min-height:100vh}.slide{position:relative;display:block!important;padding:14px}.frame{height:auto;grid-template-columns:1fr}.artifact.image{height:310px}.bottom,.top{position:sticky}.nav{display:none}}@media print{body{overflow:visible;background:#fff}.top,.bottom,.notes,.drawer{display:none!important}.deck{display:block;height:auto}.slide{position:relative;display:block!important;page-break-after:always;height:100vh}.frame{box-shadow:none}.artifact,.frame{border-color:#111}}</style></head><body><div class='deck'><div class='top'><div class='brand'><div class='mark'>+</div><div>Practical AI in Healthcare<div class='tag'>Workshop version · no repeated chapter images · artifact-led training</div></div></div><div><button id='prev'>←</button> <button id='next'>→</button> <button id='notesBtn'>Notes</button> <button id='demoBtn'>Demo prompts</button></div></div><main class='stage' id='stage'></main><div class='bottom'><div class='nav' id='nav'></div><div class='counter' id='count'>1 / 1</div></div></div><div class='notes' id='notes'><b>Trainer note</b><p id='noteText'></p></div><aside class='drawer' id='drawer'><header><h2>Demo prompt library</h2><button id='closeDrawer'>Close</button></header><select id='promptSelect'></select><pre id='promptText'></pre><div class='actions'><button id='copyPrompt'>Copy</button><button onclick='window.print()'>Print / Save PDF</button></div></aside><script>const A='assets/';const slides=[{ch:`Opening`,a:`#246bfe`,t:`The hospital AI story we are going to build`,lead:`We start from one real spark: better translation. Then we build a safe path toward workflow automation, radiology readiness, physiotherapy support, vendor evaluation and 90-day pilots.`,explain:`The deck is now designed as a workshop, not a topic summary. Images are used only as chapter openers. Teaching slides show usable artifacts: prompts, before/after outputs, risk ladders, worklists, scorecards and pilot templates.`,scenario:`A fictional hospital team appears throughout: Nurse Aida handles patient instructions; Mr Lim manages radiology workflow; Mei leads physiotherapy; Daniel owns operations; Sara owns governance and IT risk.`,example:`The story arc: Aida sees translation working → Sara adds data rules → Daniel maps workflows → Lim tests radiology queue simulation → Mei tests physio progress summaries → leaders evaluate vendors → the hospital leaves with pilots.`,demo:`Ask participants to name one repeated work pain. Capture it in the use-case register artifact.`,practice:`Each table writes one task they want AI to help with and one risk if used carelessly.`,take:`The hospital should leave with AI judgement, not just AI excitement.`,artifact:`<div class='artifact image'><img src='${A}hero-healthcare-ai.webp' alt='Hospital AI collaboration'></div>`,notes:`Explain why images are not repeated. The training artifacts do the teaching.`},{ch:`Opening`,a:`#246bfe`,t:`Meet the fictional hospital team`,lead:`The same characters keep the story grounded. They turn AI concepts into hospital situations.`,explain:`Instead of abstract AI topics, each chapter follows a realistic staff problem. This makes the deck easier to demo to hospital managers.`,scenario:`Aida wants multilingual discharge instructions. Mr Lim wants critical scans reviewed faster. Mei wants cleaner rehab progress notes. Daniel wants SOP and audit drafts. Sara wants privacy, review gates and vendor controls.`,example:`Each person has a safe AI use case and a risky version. The training teaches participants to tell the difference.`,demo:`Read the team roles aloud and ask participants who in their hospital would match each role.`,practice:`Participants map their own department roles to the fictional team.`,take:`Good AI training feels like the hospital’s own work, not a software lecture.`,artifact:`<div class='artifact'><h2>Story cast</h2><table><tr><th>Person</th><th>Role</th><th>AI question</th></tr><tr><td>Nurse Aida</td><td>Patient education</td><td>Can AI draft safe translations?</td></tr><tr><td>Mr Lim</td><td>Radiology manager</td><td>Can AI help prioritize worklists?</td></tr><tr><td>Mei</td><td>Physio lead</td><td>Can AI summarize rehab progress?</td></tr><tr><td>Daniel</td><td>Operations</td><td>Can AI draft SOPs and audit checklists?</td></tr><tr><td>Sara</td><td>Governance / IT</td><td>What data, review and vendor controls are needed?</td></tr></table></div>`,notes:`This fixes the weak storytelling problem.`},{ch:`AI basics`,a:`#0f766e`,t:`AI is a drafting engine, not a clinical authority`,lead:`AI can draft, structure, translate and summarize. It should not become the reason for a clinical decision.`,explain:`Generative AI predicts useful output from patterns. It can sound confident even when context is missing. Hospital training must teach staff to separate preparation work from accountable decisions.`,scenario:`Daniel pastes messy meeting notes into AI. It returns a clean action list. That is useful. But if it invents a policy or says a patient is stable when the note never said that, it becomes unsafe.`,example:`Safe: turn stated facts into a checklist. Unsafe: infer diagnosis, treatment or clinical stability from incomplete notes.`,demo:`Show a bad prompt and a safe prompt side by side. Ask which one invites guessing.`,practice:`Participants classify tasks as Draft, Structure, Analyze, Decide or Approve.`,take:`AI can prepare work. Humans approve work.`,artifact:`<div class='artifact'><h2>AI task boundary</h2><table><tr><th>Task</th><th>AI role</th><th>Human role</th></tr><tr><td>Meeting notes</td><td>Summarize stated points</td><td>Confirm accuracy</td></tr><tr><td>Patient instruction</td><td>Draft plain-language wording</td><td>Clinical review</td></tr><tr><td>Radiology flag</td><td>Operational signal only</td><td>Radiologist decides</td></tr><tr><td>Treatment plan</td><td>Not allowed in training</td><td>Qualified clinician only</td></tr></table></div>`,notes:`Use this as the first safety foundation.`},{ch:`AI basics`,a:`#0f766e`,t:`Bad AI use versus safer AI use`,lead:`Participants learn fastest when they see contrast.`,explain:`The goal is not to scare staff away from AI. The goal is to teach better framing. A safer AI request uses approved source data, limits AI from inventing facts, and routes output to the right reviewer.`,scenario:`Aida asks AI to translate a discharge instruction. The bad prompt says “make this nicer”. The safe prompt says “use only this approved text, keep medication names unchanged, and flag uncertain terms”.`,example:`The safer version controls source, scope, output and review.`,demo:`Display the comparison and ask the room to improve one unsafe prompt.`,practice:`Each table rewrites one bad AI request into a safer request.`,take:`The quality of AI output starts with the quality of the instruction and review gate.`,artifact:`<div class='artifact'><h2>Bad vs safer use</h2><table><tr><th>Bad use</th><th>Safer use</th></tr><tr><td>Diagnose this patient from symptoms.</td><td>Summarize stated symptoms and list missing questions for clinician review.</td></tr><tr><td>Rewrite this medication instruction freely.</td><td>Translate approved text and flag medical terms needing review.</td></tr><tr><td>Which scan is urgent?</td><td>Simulate worklist order using synthetic AI flags for manager discussion.</td></tr><tr><td>Recommend new rehab exercises.</td><td>Summarize progress trends and missing data for physiotherapist review.</td></tr></table></div>`,notes:`This replaces repeated explanation slides with a useful teaching artifact.`},{ch:`Translation`,a:`#0f766e`,t:`Chapter opener: translation as the first safe win`,lead:`Translation gets one chapter opener image only. The next slides teach using tables, prompts and review artifacts.`,explain:`Translation is a good first pilot because the value is obvious and the risk can be controlled. But it should use approved source text, protected medical terms and a review column.`,scenario:`Nurse Aida needs to prepare discharge instructions in Malay, Mandarin and Tamil for common patient education material.`,example:`AI drafts the translations. A clinician or trained reviewer checks warning signs, medication names, dosage, dates and escalation instructions.`,demo:`Open the demo prompt drawer and select Translation prompt.`,practice:`Participants identify terms that must be reviewed before giving output to patients.`,take:`Translation is useful because it is practical, not because it is risk-free.`,artifact:`<div class='artifact image'><img src='${A}translation-ai.webp' alt='AI translation in hospital communication'></div>`,notes:`This is the only full translation image slide.`},{ch:`Translation`,a:`#0f766e`,t:`Translation demo: source → prompt → reviewed output`,lead:`This slide shows the actual training demo instead of repeating the image.`,explain:`A good translation workflow has three parts: approved source text, controlled prompt, and human review. AI should not add new medical advice.`,scenario:`Aida uses approved generic discharge text. There are no patient identifiers. The output goes into a review table before use.`,example:`High-risk terms are preserved or flagged: fever, chest pain, severe bleeding, shortness of breath, medication name, dosage, appointment date.`,demo:`Paste the source and prompt. Ask AI to produce a table: English | Malay | Mandarin | Tamil | Terms needing review.`,practice:`Participants inspect the output and mark which lines require clinical review.`,take:`The review column is the control point.`,artifact:`<div class='artifact'><h2>Live demo artifact</h2><pre>Source text:
Return immediately if you develop fever, chest pain, severe bleeding, or shortness of breath.

Prompt:
Translate into Malay, Mandarin and Tamil.
Rules:
1. Use simple patient language.
2. Do not add new medical advice.
3. Keep medication names and dates unchanged.
4. Add a column: Terms needing human review.</pre><table><tr><th>English</th><th>Malay</th><th>Mandarin</th><th>Review flag</th></tr><tr><td>shortness of breath</td><td>sesak nafas</td><td>呼吸困难</td><td>Clinical term review</td></tr></table></div>`,notes:`This should be the actual slide shown during demo.`},{ch:`Translation`,a:`#0f766e`,t:`Translation review checklist`,lead:`A translation pilot needs a checklist so staff know what to review every time.`,explain:`The checklist prevents the common failure mode: AI sounds fluent, so people trust it without checking clinical meaning.`,scenario:`Aida’s team reviews every AI-translated patient handout against the same checklist before use.`,example:`If the output changes “return immediately” into “consider returning”, the urgency has been weakened. That should fail review.`,demo:`Show an intentionally flawed translation and ask the room to find the issue.`,practice:`Participants decide which fields need clinical reviewer, language reviewer or both.`,take:`Fluent language is not enough. Clinical meaning must survive translation.`,artifact:`<div class='artifact'><h2>Review checklist</h2><table><tr><th>Check</th><th>Reviewer question</th></tr><tr><td>Medication</td><td>Are names, dosage and timing unchanged?</td></tr><tr><td>Warning signs</td><td>Are emergency symptoms translated with same urgency?</td></tr><tr><td>Dates</td><td>Are appointment dates and time windows preserved?</td></tr><tr><td>New advice</td><td>Did AI add advice not in source text?</td></tr><tr><td>Plain language</td><td>Can a patient understand it?</td></tr></table></div>`,notes:`This removes unnecessary repeated translation slides.`},{ch:`Prompting`,a:`#ef4444`,t:`Prompting is a tiny SOP`,lead:`A good prompt works like a short SOP: role, source, rules, output and review.`,explain:`The prompt teaches AI how to behave. If the prompt is vague, AI fills gaps. If the prompt is structured, the output is easier to review and safer to reuse.`,scenario:`Daniel wants an SOP draft from scattered staff notes. A bad prompt asks AI to “write an SOP”. A better prompt says to use only the notes, separate assumptions, and include audit evidence.`,example:`This approach works for translation, handover, SOPs, complaint summaries and vendor review.`,demo:`Build the prompt formula live with the room.`,practice:`Each table creates one prompt using the formula.`,take:`Prompting is not creativity. It is control design.`,artifact:`<div class='artifact'><h2>Prompt formula card</h2><div class='steps'><div class='step'><b>Role</b><br>You are a hospital documentation assistant.</div><div class='step'><b>Source</b><br>Use only the text below.</div><div class='step'><b>Rules</b><br>Do not diagnose. Do not invent policy. Flag missing info.</div><div class='step'><b>Output</b><br>Return table: Summary, Actions, Owner, Risk, Review needed.</div></div></div>`,notes:`This should be a core training slide.`},{ch:`Prompting`,a:`#ef4444`,t:`Documentation demo: messy note to structured handover`,lead:`This is a safe demo every hospital department can understand.`,explain:`AI is useful for turning messy text into structure. The safety rule is that AI must not invent missing facts. It should label unknowns as missing.`,scenario:`Mei has a physio follow-up note with dizziness, missed exercises and a request for Mandarin instruction. AI helps structure it for clinician review.`,example:`Expected output should separate facts, missing data, action items and review flags.`,demo:`Use Documentation prompt in the drawer. Paste the synthetic note shown here.`,practice:`Participants mark AI output as stated fact, assumption or needs review.`,take:`The safest early automation is structure, not decision-making.`,artifact:`<div class='artifact'><h2>Before / after demo</h2><pre>Messy note:
Follow-up. Dizziness after standing. Missed home exercises twice. Pain 3/10. Next session needs balance check. Daughter asked for Mandarin home instruction.</pre><table><tr><th>Output section</th><th>Expected content</th></tr><tr><td>Facts</td><td>Dizziness after standing; missed exercises twice; pain 3/10</td></tr><tr><td>Missing</td><td>Fall history, medication change, duration</td></tr><tr><td>Actions</td><td>Clinician review; prepare Mandarin instruction draft</td></tr></table></div>`,notes:`This gives a concrete live exercise.`},{ch:`Governance`,a:`#f59e0b`,t:`Chapter opener: governance is the safety belt`,lead:`Governance gets one chapter image. Teaching slides then show the actual traffic light and register artifacts.`,explain:`Hospitals already know risk management. AI should not bypass it. Governance tells staff what data can be used, who reviews output and when a use case needs formal approval.`,scenario:`Sara sees departments excited by AI. She does not block them. She creates simple rules so they can move safely.`,example:`Green use cases can start with review. Yellow use cases need owner approval. Red use cases need formal clinical, legal, security and regulatory review.`,demo:`Introduce the traffic light model before showing the artifact.`,practice:`Ask participants for one green, one yellow and one red AI idea.`,take:`Governance is not a brake. It is how the hospital avoids crashing.`,artifact:`<div class='artifact image'><img src='${A}governance-ai.webp' alt='AI governance in healthcare'></div>`,notes:`Only governance opener uses image.`},{ch:`Governance`,a:`#f59e0b`,t:`Traffic light risk ladder`,lead:`This is the shared language for AI use cases.`,explain:`The traffic light model lets non-technical managers classify AI ideas quickly. It keeps low-risk productivity moving while stopping unsafe clinical use.`,scenario:`Aida’s translation draft is Yellow because it is patient-facing. Daniel’s meeting summary is Green. AI diagnosis from symptoms is Red.`,example:`The same AI tool can be Green in one workflow and Red in another. Risk depends on data, output and decision impact.`,demo:`Classify five examples with the room.`,practice:`Groups classify their own use case and define one control.`,take:`Risk scoring is the bridge between excitement and safe action.`,artifact:`<div class='artifact'><h2>AI traffic light</h2><div class='traffic'><div class='green'><b>Green</b><p>Admin drafts, meeting summaries, SOP drafts from non-sensitive notes.</p></div><div class='yellow'><b>Yellow</b><p>Patient-facing material, workflow prioritisation, dashboards, translation drafts.</p></div><div class='red'><b>Red</b><p>Diagnosis, treatment, autonomous clinical decisions, real patient data in unapproved tools.</p></div></div></div>`,notes:`This replaces generic governance wording.`},{ch:`Governance`,a:`#f59e0b`,t:`AI use-case register`,lead:`A register turns random enthusiasm into managed pilots.`,explain:`Every AI idea should record owner, department, workflow, data, risk, reviewer, metric and next step. This prevents shadow AI and helps management prioritize.`,scenario:`Aida, Lim, Mei and Daniel each submit one idea. Sara reviews risk and routes each idea appropriately.`,example:`Translation and SOP drafting may proceed as low-risk pilots. Radiology triage requires stronger governance and vendor validation.`,demo:`Fill one row live using the translation pilot.`,practice:`Each table adds two rows: one safe pilot and one idea that needs formal review.`,take:`If it is not registered, it is not ready to scale.`,artifact:`<div class='artifact'><h2>Use-case register example</h2><table><tr><th>Department</th><th>Use case</th><th>Data</th><th>Risk</th><th>Reviewer</th><th>Metric</th></tr><tr><td>Nursing</td><td>Translate approved discharge text</td><td>No patient identifiers</td><td>Yellow</td><td>Nurse educator</td><td>Time saved + defects</td></tr><tr><td>Operations</td><td>Draft SOP from notes</td><td>Internal process notes</td><td>Green</td><td>Process owner</td><td>Draft time reduced</td></tr></table></div>`,notes:`This is a working artifact.`},{ch:`Workflow`,a:`#7c3aed`,t:`Workflow map before tool choice`,lead:`Do not automate a workflow you cannot explain.`,explain:`A workflow map shows trigger, input, AI assist point, review, output and evidence. It stops people from buying tools before understanding process.`,scenario:`Patient education workflow: doctor approves English text → AI drafts translations → nurse reviews flagged terms → final version stored → patient receives approved copy.`,example:`AI enters only at draft stage. Approval stays with hospital staff. Evidence records reviewer and date.`,demo:`Map the translation workflow live, then ask groups to map their own department workflow.`,practice:`Draw six boxes: Trigger, Input, AI Assist, Review, Output, Evidence.`,take:`The workflow decides the AI tool, not the reverse.`,artifact:`<div class='artifact'><h2>Safe AI workflow map</h2><div class='flow'><div>Trigger</div><div>Input</div><div>AI draft</div><div>Human review</div><div>Approved output</div><div>Evidence log</div></div><p>Use this six-box map before selecting any AI platform.</p></div>`,notes:`This is the practical pattern for every department.`},{ch:`Radiology`,a:`#0369a1`,t:`Chapter opener: radiology AI readiness`,lead:`Radiology image appears once. Teaching slides show worklists, metrics and vendor questions.`,explain:`The right training angle is not “AI reads the scan”. It is radiology AI readiness: PACS/RIS workflow, worklist priority, human review, metrics, override logs and vendor due diligence.`,scenario:`Mr Lim wants urgent findings reviewed faster. Sara asks where AI output appears, who sees it, what happens when it is wrong and how performance is measured.`,example:`AI abnormality flag becomes an operational signal. Radiologist remains accountable for interpretation and report.`,demo:`Introduce the synthetic worklist simulation.`,practice:`Ask radiology participants where AI should enter their current workflow.`,take:`Radiology AI is a workflow and governance project before it is a technology project.`,artifact:`<div class='artifact image'><img src='${A}radiology-ai.webp' alt='Radiology AI workflow'></div>`,notes:`Only radiology opener uses image.`},{ch:`Radiology`,a:`#0369a1`,t:`Radiology worklist simulation`,lead:`This is the actual demo artifact for radiology managers.`,explain:`The purpose is to show operational impact, not diagnosis. The worklist keeps original arrival time visible, adds AI flag, proposes priority order and requires human review.`,scenario:`AI flags possible pneumothorax on an X-ray. The case moves up the queue, but the radiologist still reviews and decides.`,example:`The safe output explains why priority changed and records review needed. It does not produce a final radiology report.`,demo:`Paste synthetic CSV into AI and ask it to reorder cases with explanation.`,practice:`Participants define escalation for high-priority AI flag.`,take:`AI triage without escalation design creates risk.`,artifact:`<div class='artifact'><h2>Synthetic PACS worklist</h2><table><tr><th>Arrival</th><th>Study</th><th>AI flag</th><th>Proposed action</th></tr><tr><td>08:01</td><td>Chest X-ray</td><td>Possible pneumothorax</td><td>Move to top; radiologist review</td></tr><tr><td>08:04</td><td>CT head</td><td>No acute flag</td><td>Keep queue</td></tr><tr><td>08:06</td><td>MRI knee</td><td>Routine</td><td>Routine queue</td></tr><tr><td>08:08</td><td>CT chest</td><td>Possible PE</td><td>High priority review</td></tr></table></div>`,notes:`This replaces repeated radiology visuals.`},{ch:`Radiology`,a:`#0369a1`,t:`Radiology metrics and vendor questions`,lead:`A pilot must prove workflow impact and safety.`,explain:`Do not judge radiology AI only by vendor accuracy claims. Managers need operational metrics and due-diligence questions: validation data, local fit, false positives, false negatives, downtime, logs and override handling.`,scenario:`A vendor says reporting delay drops by 40%. Mr Lim asks compared to which baseline, which modality, which finding and what happened to false negatives.`,example:`Success metrics: critical finding turnaround time, report turnaround time by priority, override rate, false positive review, downtime handling.`,demo:`Give the room a vendor claim and ask them to convert it into questions.`,practice:`Each group writes one safety, workflow, cybersecurity, cost and evidence question.`,take:`Vendor claims must become measurable hospital evidence.`,artifact:`<div class='artifact'><h2>Radiology pilot scorecard</h2><table><tr><th>Area</th><th>Question</th></tr><tr><td>Validation</td><td>Was it tested on similar patient data and modalities?</td></tr><tr><td>Workflow</td><td>Where does the AI flag appear in PACS/RIS?</td></tr><tr><td>Safety</td><td>How are false negatives reviewed?</td></tr><tr><td>Audit</td><td>Are AI output, user action and override logged?</td></tr><tr><td>Metric</td><td>Did TAT improve without increasing unsafe misses?</td></tr></table></div>`,notes:`Useful for radiology managers.`},{ch:`Physio`,a:`#16a34a`,t:`Chapter opener: physiotherapy and digital rehab`,lead:`Physio image appears once. Teaching slides use progress trackers and symptom diary artifacts.`,explain:`Physio AI should support documentation, progress review, patient instructions and adherence tracking. It should not replace assessment or prescribe treatment independently.`,scenario:`Mei wants to summarize rehab progress and prepare patient-friendly instructions. Sara asks where data comes from and who reviews the output.`,example:`AI can show trends in pain score, exercise adherence and range-of-motion notes, then prepare questions for the next session.`,demo:`Introduce the progress tracker artifact.`,practice:`Ask physio participants what progress data they already collect.`,take:`AI should make progress visible, not decide therapy.`,artifact:`<div class='artifact image'><img src='${A}physio-ai.webp' alt='Physiotherapy AI support'></div>`,notes:`Only physio opener uses image.`},{ch:`Physio`,a:`#16a34a`,t:`Physio progress tracker demo`,lead:`This demo shows how AI can summarize structured rehab progress for clinician review.`,explain:`The safe task is trend summary, missing data and patient-friendly explanation. The unsafe task is changing treatment plan without clinician review.`,scenario:`Mei sees pain score improving from 6/10 to 3/10 and exercise adherence improving from 2/5 to 4/5. AI summarizes trend and asks follow-up questions.`,example:`Good output: “Progress improving; ask about dizziness during standing; confirm home exercise barriers.” Unsafe output: “Stop current therapy and start new protocol.”`,demo:`Paste the progress tracker into AI and ask for trend summary, missing data and questions.`,practice:`Participants decide what output can be shown to patient and what must stay clinician-only.`,take:`AI can support coaching conversations when the clinician remains in control.`,artifact:`<div class='artifact'><h2>Synthetic rehab progress</h2><table><tr><th>Week</th><th>Pain</th><th>Exercise completion</th><th>Balance confidence</th><th>AI review question</th></tr><tr><td>1</td><td>6/10</td><td>2/5</td><td>Low</td><td>What blocked exercises?</td></tr><tr><td>2</td><td>4/10</td><td>3/5</td><td>Medium</td><td>Any dizziness?</td></tr><tr><td>3</td><td>3/10</td><td>4/5</td><td>Medium</td><td>Ready for clinician review?</td></tr></table></div>`,notes:`Concrete physio demo.`},{ch:`Vestibular`,a:`#16a34a`,t:`Vestibular diary support`,lead:`AI can organize symptom stories, but it must not diagnose vestibular conditions.`,explain:`The safe task is to summarize triggers, duration, frequency, fall-risk signals and missing questions. The clinician interprets the pattern and decides assessment.`,scenario:`A patient diary mentions dizziness after standing, supermarket dizziness, nausea, and a near-fall. AI organizes the diary into review points.`,example:`Safe output: “Common trigger: standing and crowded visual environment. Missing: medication changes, blood pressure, hearing symptoms.” Unsafe output: “Diagnosis is vestibular neuritis.”`,demo:`Use Vestibular diary prompt and inspect whether AI crosses into diagnosis.`,practice:`Participants cross out any AI sentence that diagnoses or recommends treatment.`,take:`AI can organize patient stories; clinicians interpret them.`,artifact:`<div class='artifact'><h2>Synthetic vestibular diary</h2><pre>Mon: Dizzy after standing, about 5 minutes.
Tue: Supermarket dizziness with nausea, about 10 minutes.
Thu: Near-fall at bathroom doorway.
No hearing change recorded.</pre><table><tr><th>AI output section</th><th>Expected safe output</th></tr><tr><td>Triggers</td><td>Standing, crowded visual setting</td></tr><tr><td>Missing questions</td><td>Medication changes, fall history detail, hearing symptoms</td></tr><tr><td>Boundary</td><td>No diagnosis</td></tr></table></div>`,notes:`This addresses the vestibular training request with safe AI boundary.`},{ch:`Clinical AI`,a:`#334155`,t:`Prediction is not permission to act`,lead:`Clinical decision support and risk prediction need stronger governance than office AI.`,explain:`A risk score is a signal, not an instruction. Clinical AI requires validation, monitoring, workflow control, alert management and clear accountability.`,scenario:`A readmission risk model flags a patient. Safe response: case manager reviews discharge plan. Unsafe response: system automatically changes care plan without review.`,example:`Good language: “Consider review because risk factors are present.” Bad language: “Patient must receive treatment X.”`,demo:`Compare two AI outputs and ask which one is advisory versus unsafe.`,practice:`Classify examples as advisory, interruptive or unacceptable.`,take:`Clinical AI must be governed before deployment.`,artifact:`<div class='artifact'><h2>CDSS boundary table</h2><table><tr><th>AI output</th><th>Classification</th><th>Why</th></tr><tr><td>Flag for clinician review due to missing follow-up</td><td>Advisory</td><td>Human decides</td></tr><tr><td>Automatically change treatment plan</td><td>Unacceptable</td><td>Clinical decision without review</td></tr><tr><td>Show risk factors and missing information</td><td>Useful</td><td>Supports review</td></tr></table></div>`,notes:`This separates clinical AI from admin AI.`},{ch:`Vendors`,a:`#0f766e`,t:`Chapter opener: evaluate vendors by controls, not hype`,lead:`Vendor image appears once. Teaching slides use scorecards and decision trees.`,explain:`The best AI vendor is not always the smartest model. Hospitals need privacy, audit, integration, cost control, support and exit plan.`,scenario:`A vendor offers low-cost AI translation. Sara asks whether prompts are retained, whether data trains the model, whether SSO/MFA exists and how logs are exported.`,example:`The same use case may fit SaaS, private cloud or self-hosted depending on sensitivity and operating capability.`,demo:`Introduce the vendor scorecard.`,practice:`Ask participants what would be a vendor red flag.`,take:`Buy controls, not just intelligence.`,artifact:`<div class='artifact image'><img src='${A}vendor-ai.webp' alt='AI vendor comparison'></div>`,notes:`Only vendor opener uses image.`},{ch:`Vendors`,a:`#0f766e`,t:`Vendor scorecard`,lead:`Use the same questions for OpenAI, Claude, Azure AI Foundry, AWS Bedrock, Gemini, China models and self-hosted models.`,explain:`The hospital should score vendors against the operating requirement: privacy, security, data handling, integration, audit, RAG, cost, support, exit and model suitability.`,scenario:`Translation with no patient data may fit enterprise SaaS. A private policy chatbot may fit Azure AI Foundry. Sensitive clinical workflows may require regulated healthcare software and formal governance.`,example:`Self-hosted models improve control only if the hospital can operate patching, monitoring, access control, GPU cost and model updates.`,demo:`Score three options for one use case: SaaS, private cloud, self-hosted.`,practice:`Groups choose a platform path for translation, policy chatbot and radiology AI readiness.`,take:`Choose by use case risk and operating capability, not brand preference.`,artifact:`<div class='artifact'><h2>AI vendor scorecard</h2><table><tr><th>Criteria</th><th>Question</th><th>Score</th></tr><tr><td>Privacy</td><td>Are prompts/responses used for model training?</td><td>1-5</td></tr><tr><td>Security</td><td>SSO, MFA, RBAC, audit logs?</td><td>1-5</td></tr><tr><td>Data control</td><td>Retention, deletion, residency, export?</td><td>1-5</td></tr><tr><td>Integration</td><td>Can it connect to Microsoft/AWS/EMR safely?</td><td>1-5</td></tr><tr><td>Exit</td><td>Can hospital leave without lock-in?</td><td>1-5</td></tr></table></div>`,notes:`This is the practical vendor slide.`},{ch:`Vendors`,a:`#0f766e`,t:`Deployment decision tree`,lead:`SaaS, private cloud, on-prem and self-hosted are not better or worse by default. They fit different risks.`,explain:`Low-risk productivity can start with enterprise SaaS. Sensitive internal knowledge may need private cloud. Strict data-control use cases may consider self-hosted, but only with infrastructure and security maturity.`,scenario:`A nonprofit hospital should not start by self-hosting just because it sounds cheaper. Hardware, patching, monitoring and security become the hospital’s responsibility.`,example:`A free model is like a free puppy: the operating cost comes after adoption.`,demo:`Walk through the decision tree with three scenarios.`,practice:`Each group decides a deployment model for its pilot idea.`,take:`The safest platform is the one the hospital can actually govern and operate.`,artifact:`<div class='artifact'><h2>Deployment decision tree</h2><div class='steps'><div class='step'><b>1. No patient data + low-risk productivity?</b><br>Use enterprise SaaS with admin controls.</div><div class='step'><b>2. Internal sensitive knowledge + integrations?</b><br>Consider private cloud with identity, logs and network control.</div><div class='step'><b>3. Strict data control + strong IT team?</b><br>Consider self-hosted/open-weight models.</div><div class='step'><b>4. Clinical AI?</b><br>Use approved clinical system with formal governance.</div></div></div>`,notes:`This addresses vendor/deployment choice.`},{ch:`Roadmap`,a:`#246bfe`,t:`30-60-90 day plan`,lead:`The hospital can start small without waiting for a large investment.`,explain:`The first 90 days should focus on capability: collect use cases, risk-score them, run low-risk pilots, measure evidence and only then evaluate larger investment.`,scenario:`The hospital selects three pilots: approved translation workflow, SOP drafting workflow and physio progress summary. Radiology AI remains in readiness/evaluation until governance and vendor validation are clear.`,example:`Every pilot needs owner, data boundary, reviewer, metric, stop condition and decision date.`,demo:`Build one pilot charter live using the translation workflow.`,practice:`Each table completes one pilot charter.`,take:`Small controlled wins beat expensive uncontrolled ambition.`,artifact:`<div class='artifact'><h2>90-day action board</h2><table><tr><th>Time</th><th>Action</th><th>Output</th></tr><tr><td>30 days</td><td>Collect and risk-score use cases</td><td>Use-case register</td></tr><tr><td>60 days</td><td>Run 2-3 low-risk pilots</td><td>Evidence log</td></tr><tr><td>90 days</td><td>Review results and decide scale</td><td>Scale / revise / stop</td></tr></table></div>`,notes:`This is the self-sufficiency ending.`},{ch:`Roadmap`,a:`#246bfe`,t:`Final workshop output`,lead:`A good training session should leave behind working material, not only slides.`,explain:`At the end, the hospital should have concrete artifacts it can keep using: use-case register, risk scoring sheet, prompt pack, translation review checklist, workflow map, vendor scorecard and pilot charter.`,scenario:`Sara collects the completed worksheets. Department champions continue meeting monthly to review new AI ideas and pilot evidence.`,example:`The hospital is now able to say: here are our safe use cases, here are our risky ones, here are our controls and here is what we will test next.`,demo:`Close by showing the four final questions.`,practice:`Each group submits one safe pilot idea and one governance control.`,take:`Responsible AI is not slower. It is how hospitals move safely and independently.`,artifact:`<div class='artifact'><h2>Four final questions</h2><div class='steps'><div class='step'><b>1. What data goes in?</b></div><div class='step'><b>2. What output comes out?</b></div><div class='step'><b>3. Who checks it?</b></div><div class='step'><b>4. Who owns the risk?</b></div></div><p>If a team cannot answer these, the use case is not ready.</p></div>`,notes:`This is the close.`}];const prompts={Translation:`You are a hospital patient education assistant. Translate the approved instruction into Malay, Mandarin and Tamil. Do not add new medical advice. Keep medication names unchanged. Add a final column called Terms needing human review. Text: [paste synthetic instruction]`,Documentation:`Convert this synthetic note into a structured handover with: Summary, Key facts, Missing information, Actions, Owner, Due date, Risk. Do not infer facts that are not stated. Note: [paste synthetic note]`,SOP:`Create an internal SOP draft from these process notes. Include purpose, scope, roles, steps, approvals, exceptions, audit evidence and training checklist. Put assumptions separately. Notes: [paste notes]`,Radiology:`Use this synthetic radiology worklist. Simulate how AI abnormality flags might prioritize worklist order. This is operational simulation only, not diagnosis. Keep original arrival time visible and explain any movement. Data: [paste CSV]`,Physio:`Summarize this synthetic physiotherapy progress data for clinician review. Output: trend summary, missing data, patient-friendly explanation and questions for next session. Do not diagnose or change treatment. Data: [paste synthetic data]`,Vestibular:`Summarize this synthetic vestibular diary. Output: common triggers, duration pattern, fall risk signals, missing questions for clinician and patient-friendly summary. Do not diagnose. Diary: [paste diary]`,Vendor:`Act as a hospital AI procurement reviewer. Score this vendor response 1-5 across privacy, security, retention, SSO/MFA, audit logs, data residency, integration, cost and exit plan. Include follow-up questions. Vendor response: [paste response]`};const stage=document.getElementById('stage');function block(cls,h,text){return `<div class='block ${cls}'><h3>${h}</h3><p>${text}</p></div>`}slides.forEach(s=>stage.insertAdjacentHTML('beforeend',`<section class='slide' data-ch='${s.ch}' style='--accent:${s.a}'><div class='frame'><div class='main'><span class='kicker'>${s.ch}</span><h1>${s.t}</h1><p class='lead'>${s.lead}</p>${block('',`Explain it`,s.explain)}${block('scenario',`Hospital scenario`,s.scenario)}${block('scenario',`Realistic example`,s.example)}${block('demo',`Live demo`,s.demo)}${block('practice',`Room exercise`,s.practice)}${block('take',`Manager takeaway`,s.take)}</div><aside class='side'>${s.artifact}</aside></div></section>`));const nav=document.getElementById('nav');[...new Map(slides.map(s=>[s.ch,s])).values()].forEach(s=>nav.insertAdjacentHTML('beforeend',`<button style='--c:${s.a}' data-ch='${s.ch}'>${s.ch}</button>`));const slideEls=[...document.querySelectorAll('.slide')],count=document.getElementById('count'),notes=document.getElementById('notes'),noteText=document.getElementById('noteText'),drawer=document.getElementById('drawer');let i=0;function show(n){i=Math.max(0,Math.min(slideEls.length-1,n));slideEls.forEach((s,k)=>s.classList.toggle('active',k===i));count.textContent=(i+1)+' / '+slideEls.length;noteText.textContent=slides[i].notes||'';location.hash='slide-'+String(i+1).padStart(2,'0')}function next(){show(i+1)}function prev(){show(i-1)}document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('notesBtn').onclick=()=>notes.classList.toggle('open');document.getElementById('demoBtn').onclick=()=>drawer.classList.add('open');document.getElementById('closeDrawer').onclick=()=>drawer.classList.remove('open');document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{const n=slides.findIndex(s=>s.ch===b.dataset.ch);if(n>=0)show(n)});const sel=document.getElementById('promptSelect'),pre=document.getElementById('promptText');Object.keys(prompts).forEach(k=>sel.insertAdjacentHTML('beforeend',`<option>${k}</option>`));function loadPrompt(){pre.textContent=prompts[sel.value]}sel.onchange=loadPrompt;loadPrompt();document.getElementById('copyPrompt').onclick=async()=>{try{await navigator.clipboard.writeText(pre.textContent)}catch(e){}};document.addEventListener('keydown',e=>{if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();if(e.key.toLowerCase()==='n')notes.classList.toggle('open');if(e.key.toLowerCase()==='d')drawer.classList.toggle('open');if(e.key.toLowerCase()==='p')window.print()});const m=(location.hash||'').match(/slide-(\d+)/);if(m)i=Number(m[1])-1;show(i);</script></body></html>
