r-events:none}.demo,.exercise{border:1.5px solid var(--line);border-radius:18px;background:#fff;padding:13px 15px}.exercise{background:#fff7e6}.take{border:2px solid var(--black);border-radius:18px;background:#111827;color:#fff;padding:13px 15px}.take b{color:#93c5fd}.take p{color:#f8fafc;font-weight:760}.bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);background:rgba(255,253,247,.86);padding:10px 18px}.nav{display:flex;gap:7px;overflow:auto;max-width:74vw}.nav button{box-shadow:none;font-size:12px;color:var(--c);border-color:var(--c)}.counter{font-weight:900;color:var(--muted);font-variant-numeric:tabular-nums}.notes{position:fixed;right:18px;top:84px;width:min(520px,calc(100vw - 36px));max-height:72vh;overflow:auto;background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);padding:16px;display:none;z-index:20}.notes.open{display:block}.notes b{color:var(--teal)}.drawer{position:fixed;right:18px;top:84px;bottom:72px;width:min(620px,calc(100vw - 36px));background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);display:none;z-index:21;grid-template-rows:auto auto 1fr auto;overflow:hidden}.drawer.open{display:grid}.drawer header{background:#111827;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.drawer h2{margin:0}.drawer select{margin:14px;border:2px solid var(--black);border-radius:12px;padding:10px;font-weight:900}.drawer pre{margin:0 14px 14px;white-space:pre-wrap;overflow:auto;background:#0b1220;color:#e5e7eb;border-radius:16px;padding:16px;font-size:13px;line-height:1.45}.drawer .actions{padding:0 14px 14px;display:flex;gap:10px}@media(max-width:980px){body{overflow:auto}.deck{height:auto;min-height:100vh}.slide{position:relative;display:block!important;padding:14px}.frame{height:auto;grid-template-columns:1fr}.side{grid-template-rows:auto}.bottom,.top{position:sticky}.grid{grid-template-columns:1fr}.visual{min-height:260px}.nav{display:none}}@media print{body{overflow:visible;background:white}.top,.bottom,.notes,.drawer{display:none!important}.deck{display:block;height:auto}.slide{position:relative;display:block!important;page-break-after:always;height:100vh}.frame{box-shadow:none}.visual,.frame{border-color:#111}}</style></head><body><div class="deck"><div class="top"><div class="brand"><div class="mark">+</div><div>Practical AI in Healthcare<div class="tag">Story-led hospital training · practical demos · safe boundaries</div></div></div><div><button id="prev">←</button> <button id="next">→</button> <button id="notesBtn">Notes</button> <button id="demoBtn">Demo prompts</button></div></div><main class="stage" id="stage"></main><div class="bottom"><div class="nav" id="nav"></div><div class="counter" id="count">1 / 1</div></div></div><div class="notes" id="notes"><b>Trainer note</b><p id="noteText"></p></div><aside class="drawer" id="drawer"><header><h2>Demo prompt library</h2><button id="closeDrawer">Close</button></header><select id="promptSelect"></select><pre id="promptText"></pre><div class="actions"><button id="copyPrompt">Copy</button><button onclick="window.print()">Print / Save PDF</button></div></aside><script>const A='assets/';const slides=[{"chapter":"Prologue","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"This is the story of a hospital learning AI safely","lead":"We start with one exciting win: translation that feels better than Google Translate. Then we turn that excitement into repeatable hospital capability.","story":"Imagine the hospital as a small town. Reception, radiology, physio, nursing and managers are all roads in the town. AI is not the mayor. AI is a helper that can carry messages faster, clean forms, sort queues and prepare drafts. The town still needs rules, traffic lights and responsible people.","points":["The hospital is the main character","AI is the helper, not the hero","Managers build the road rules","Clinicians keep judgement and accountability"],"demo":"Show the full journey map: daily work → safe use → department scenarios → vendor evaluation → 90-day pilots.","exercise":"Ask every participant to write one workflow where staff lose time today.","takeaway":"The destination is self-sufficiency, not dependency on consultants.","notes":"Do not open with model names. Open with the hospital's daily pain. Make them feel: this is about their own workflow."},{"chapter":"Prologue","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"The training promise","lead":"By the end, participants should not only know AI terms. They should know how to choose safe use cases and run small pilots.","story":"A cooking class is not successful because people watched a chef cook. It is successful when people can go home and cook a simple meal safely. This session works the same way.","points":["Leave with use-case ideas","Leave with risk scoring logic","Leave with prompt patterns","Leave with pilot templates"],"demo":"Show the prompt drawer, image sections and the final pilot canvas.","exercise":"Ask: what would make this training useful on Monday morning?","takeaway":"Training should create working habits, not just awareness.","notes":"Set expectation that this is a working session. Participants should produce output."},{"chapter":"Prologue","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"What this session is not","lead":"This is not diagnosis training. It is not a shortcut around hospital governance. It is not a vendor beauty contest.","story":"A thermometer helps a doctor, but it does not become the doctor. A map helps an ambulance, but it does not decide treatment. AI belongs in the same category until formally approved for clinical use.","points":["No real patient data in public tools","No autonomous diagnosis demos","No treatment recommendation prompts","No vendor decision without evidence"],"demo":"Show one unsafe prompt and rewrite it into a safe training prompt.","exercise":"Classify examples as allowed, caution, or stop.","takeaway":"Clear boundaries make AI adoption faster, not slower.","notes":"Be firm here. It builds trust with healthcare leaders."},{"chapter":"Act 1 — Spark","accent":"#0f766e","img":"translation-ai.webp","title":"The spark: translation makes AI feel real","lead":"Translation excites everyone because the pain is obvious and the value is visible within minutes.","story":"A patient leaves the hospital with instructions they actually understand. A nurse saves time. A manager sees fewer repeated explanations. That is why translation feels magical. But healthcare translation still needs review because one wrong phrase can change risk.","points":["High visibility value","Easy for non-technical staff to understand","Works across multilingual care settings","Needs medical term review"],"demo":"Use synthetic discharge instructions and generate Malay, Mandarin and Tamil drafts with a review column.","exercise":"Participants circle words that must never be freely changed: dosage, timing, warning symptoms, appointment date.","takeaway":"Translation is the first door into AI, not the whole house.","notes":"Use their original excitement. Then gently introduce control."},{"chapter":"Act 1 — Spark","accent":"#0f766e","img":"translation-ai.webp","title":"Translation demo: from raw text to reviewed patient material","lead":"The goal is not prettier language. The goal is safer, clearer patient communication.","story":"A literal translator may move words from one language to another. A good AI workflow also asks: who is the patient, what reading level is needed, which terms are risky, and what must a human check?","points":["Use approved source text only","Ask for plain language","Ask AI to flag uncertainty","Add human review before use"],"demo":"Prompt: Translate into Malay, Mandarin and Tamil. Keep medication names unchanged. Add 'terms needing review'.","exercise":"Compare a literal translation with a controlled AI output. Which is safer?","takeaway":"The process matters more than the model.","notes":"This is a good first live demo. Use fake content only."},{"chapter":"Act 1 — Spark","accent":"#0f766e","img":"translation-ai.webp","title":"The first safety lesson: AI drafts, humans approve","lead":"Every practical use case should identify the reviewer before anyone uses the output.","story":"A pencil can write a prescription, but the pencil does not prescribe. AI can draft text, but the hospital must decide who approves it.","points":["Draft owner","Reviewer role","Approval trigger","Version trail"],"demo":"Show an output table with 'AI draft', 'review note', 'approved final'.","exercise":"Assign reviewer roles for translation, SOP drafting, and patient education material.","takeaway":"No reviewer means no production use.","notes":"Link to accountability. This is governance in simple form."},{"chapter":"Act 2 — Guardrails","accent":"#f59e0b","img":"governance-ai.webp","title":"Before AI enters the ward, build the guardrails","lead":"Hospitals already manage risk every day. AI should enter through the same discipline: data, ownership, review, audit and escalation.","story":"If a child wants to ride a bicycle, you do not begin with the highway. You start with helmet, brakes, quiet road, and someone watching. AI pilots need the same setup.","points":["Data classification","Use-case owner","Human review","Audit trail"],"demo":"Open a sample AI use-case register row and fill it live.","exercise":"Each department writes one use case and one possible harm.","takeaway":"Governance is not paperwork; it is the safety belt.","notes":"Make governance practical and non-threatening."},{"chapter":"Act 2 — Guardrails","accent":"#f59e0b","img":"governance-ai.webp","title":"Patient data: the rule that cannot be skipped","lead":"If the hospital cannot explain where data goes, who sees it, and how it is retained, the use case is not ready.","story":"Do not put a patient diary into a public suggestion box. Even if the reply is helpful, the privacy damage has already happened.","points":["Use synthetic data for training","Remove identifiers before demos","Check vendor retention policy","Log who used what tool"],"demo":"Show a note before and after de-identification.","exercise":"Redact a synthetic patient note. Remove names, IDs, dates, bed numbers and rare identifiers.","takeaway":"No data boundary, no AI workflow.","notes":"Add IAM/cybersecurity language: least privilege, auditability, data minimization."},{"chapter":"Act 2 — Guardrails","accent":"#f59e0b","img":"governance-ai.webp","title":"The traffic light model for AI use cases","lead":"Busy managers need a simple way to decide what can start now and what needs deeper review.","story":"Traffic lights work because everyone understands them. Green means go carefully. Yellow means slow down and check. Red means stop and get formal approval.","points":["Green: admin drafts and meeting summaries","Yellow: patient-facing content and dashboards","Red: diagnosis and treatment advice","Black line: real patient data in unapproved tools"],"demo":"Risk-score five examples live.","exercise":"Groups classify: translation, SOP drafting, radiology triage, physio dashboard, treatment recommendation.","takeaway":"A simple risk language prevents chaos.","notes":"This becomes the hospital's reusable mental model."},{"chapter":"Act 2 — Guardrails","accent":"#f59e0b","img":"governance-ai.webp","title":"What a hospital AI use-case register should capture","lead":"A register turns random enthusiasm into managed improvement.","story":"A library without a catalogue becomes a pile of books. AI ideas without a register become shadow IT.","points":["Department and owner","Problem and current workflow","Data involved and risk level","Reviewer, metric and next step"],"demo":"Fill one row: patient instruction translation workflow.","exercise":"Each table adds two real use cases to the register.","takeaway":"If it is not registered, it is not ready to scale.","notes":"This is the backbone of self-sufficiency."},{"chapter":"Act 3 — Prompting","accent":"#ef4444","img":"translation-ai.webp","title":"Prompting is not magic. It is instruction design.","lead":"A good prompt is a tiny SOP: role, task, data, limits, output and review.","story":"If you tell a trainee 'sort this out', you may get anything. If you give purpose, steps, format and escalation rules, the work improves. AI behaves the same way.","points":["Role: who should AI act as?","Task: what should it produce?","Boundary: what must it not do?","Format: how should output look?"],"demo":"Convert a vague prompt into a controlled hospital prompt.","exercise":"Participants rewrite one bad prompt from their department.","takeaway":"Prompt quality is workflow quality.","notes":"Make prompt engineering feel like operational discipline, not nerd tricks."},{"chapter":"Act 3 — Prompting","accent":"#ef4444","img":"translation-ai.webp","title":"The healthcare prompt formula","lead":"Use the same safe structure every time so staff do not freestyle with sensitive work.","story":"A hospital form has fields for a reason. Prompts need fields too. Missing fields create unsafe assumptions.","points":["Context: what is the situation?","Source: what information is allowed?","Rules: what must not change?","Output: table, checklist or draft?"],"demo":"Build a prompt for patient instruction translation using the formula.","exercise":"Use the formula to build prompts for SOP drafting and meeting summary.","takeaway":"Repeatable prompt templates reduce risk and rework.","notes":"This slide should slow down and teach an actual method."},{"chapter":"Act 3 — Prompting","accent":"#ef4444","img":"translation-ai.webp","title":"How to ask AI to be honest about uncertainty","lead":"AI often sounds confident. Good prompts force it to show uncertainty and missing data.","story":"A good assistant says 'I do not know' when the file is missing. A dangerous assistant invents the missing page.","points":["Ask for assumptions separately","Ask for missing information","Ask for confidence boundaries","Ask for human review flags"],"demo":"Take a messy note and ask AI to separate facts, assumptions and missing fields.","exercise":"Participants identify which parts of an AI output are unsupported.","takeaway":"Uncertainty is not weakness. It is safety.","notes":"This directly addresses hallucination without using jargon too early."},{"chapter":"Act 4 — Daily work","accent":"#7c3aed","img":"hero-healthcare-ai.webp","title":"Start where AI helps without touching diagnosis","lead":"The safest early value is in communication, documentation structure, SOPs, audit preparation and workflow clean-up.","story":"Before buying a robot surgeon, fix the paperwork traffic jam. If staff spend hours reformatting, translating and summarising, AI can clear the road.","points":["Meeting summaries","SOP and checklist drafts","Complaint and incident summaries","Training quizzes and patient education drafts"],"demo":"Convert messy synthetic process notes into a clean SOP draft.","exercise":"Map one department workflow in five steps and mark where AI can assist.","takeaway":"Automation should remove friction, not accountability.","notes":"This is the common session for all 40 participants."},{"chapter":"Act 4 — Daily work","accent":"#7c3aed","img":"hero-healthcare-ai.webp","title":"Workflow mapping: find the bottleneck before choosing the tool","lead":"AI is useful only when it enters the workflow at the right point.","story":"If a sink is blocked, buying a faster tap does not help. First find the blockage. Then decide whether AI can help.","points":["Trigger: what starts the work?","Input: what data is needed?","Decision: who approves?","Output: where does it go?"],"demo":"Map translation request from source text to reviewed patient material.","exercise":"Draw one workflow from each department on paper.","takeaway":"Do not automate a workflow you cannot explain.","notes":"This converts training from tool excitement into process thinking."},{"chapter":"Act 4 — Daily work","accent":"#7c3aed","img":"hero-healthcare-ai.webp","title":"The safe automation pattern","lead":"Most hospital AI workflows should follow draft → review → approve → record.","story":"A kitchen runner can prepare plates quickly. The chef still checks before serving. The same review gate protects hospital AI output.","points":["AI drafts or structures","Human reviews and edits","Owner approves final use","Record evidence and lesson learned"],"demo":"Show a four-column output: AI draft, reviewer comment, final output, evidence link.","exercise":"Create one review gate for each table's use case.","takeaway":"Review is the control point that makes AI usable.","notes":"This becomes the core operating model."},{"chapter":"Act 5 — Radiology","accent":"#0369a1","img":"radiology-ai.webp","title":"Radiology AI readiness is not 'AI reads the scan'","lead":"For managers, the real question is how AI changes PACS/RIS workflow, queue priority, escalation, metrics and accountability.","story":"AI in radiology is like a traffic light at a busy junction. If it works, urgent cases move faster. If it is wrong, the wrong cars get priority.","points":["Worklist prioritisation","Critical finding flagging","Turnaround time measurement","False positive and false negative review"],"demo":"Use synthetic radiology worklist CSV to simulate AI priority changes.","exercise":"Define what happens when AI flags a case as urgent.","takeaway":"Radiology AI is a workflow and governance project before it is a technology project.","notes":"Keep the boundary strong. No image diagnosis training."},{"chapter":"Act 5 — Radiology","accent":"#0369a1","img":"radiology-ai.webp","title":"The radiology workflow story","lead":"A scan does not become safer just because AI touched it. Safety comes from where the AI output lands and who acts on it.","story":"A smoke alarm is helpful because people know what to do when it rings. Without a response plan, the alarm is just noise.","points":["Image acquisition","PACS ingestion","AI flag or score","Radiologist review and final decision"],"demo":"Walk through the radiology image generated visual and explain each stage.","exercise":"Ask: should the AI flag change queue order, alert a person, or only annotate a case?","takeaway":"The response workflow matters as much as the model.","notes":"This slide tells the story behind the radiology visual."},{"chapter":"Act 5 — Radiology","accent":"#0369a1","img":"radiology-ai.webp","title":"What radiology managers should ask vendors","lead":"Vendor claims must be translated into operational evidence.","story":"A vendor demo is a magic show. Your job is to ask what happens behind the curtain.","points":["Was it validated on similar patient data?","What are false positive and false negative rates?","How are overrides logged?","What happens during downtime?"],"demo":"Score a fictional radiology AI vendor against the checklist.","exercise":"Each group writes five vendor questions that protect workflow and patient safety.","takeaway":"Do not buy a black box for a clinical workflow.","notes":"Strong management value here."},{"chapter":"Act 5 — Radiology","accent":"#0369a1","img":"radiology-ai.webp","title":"Radiology metrics: prove the AI helped","lead":"A pilot without metrics becomes a story. A pilot with metrics becomes evidence.","story":"A new traffic light should reduce waiting or accidents. If nobody measures, nobody knows whether it helped.","points":["Report turnaround time","Critical finding notification time","Override rate","Incident and miss review"],"demo":"Show a before/after dashboard mock with synthetic turnaround time.","exercise":"Pick three metrics for a radiology AI pilot.","takeaway":"Measure workflow impact, not only model accuracy.","notes":"Shift from technology to evidence."},{"chapter":"Act 6 — Physio","accent":"#16a34a","img":"physio-ai.webp","title":"Physiotherapy AI: coach assistant, not therapist replacement","lead":"AI can support documentation, progress tracking, exercise explanation and adherence review. It should not replace assessment.","story":"AI is like a scoreboard at sports practice. It can show progress, but the coach still decides how to train safely.","points":["Summarise progress notes","Prepare patient-friendly exercise instructions","Review adherence patterns","Highlight questions for next session"],"demo":"Summarise synthetic physio progress data into clinician review notes.","exercise":"Design a simple progress dashboard with non-sensitive fields.","takeaway":"AI should make progress visible, not decide therapy.","notes":"This is a practical, lower-risk department demo if framed properly."},{"chapter":"Act 6 — Physio","accent":"#16a34a","img":"physio-ai.webp","title":"Movement analysis: useful signal, not final judgement","lead":"Digital movement tools can help observe progress, but clinical interpretation stays with the physiotherapist.","story":"A ruler can measure height, but it does not decide whether a child is healthy. Measurement supports judgement; it does not replace it.","points":["Range-of-motion trends","Exercise completion","Pain score changes","Missing data and follow-up questions"],"demo":"Use synthetic progress CSV and ask AI to find trend, missing values and questions.","exercise":"Identify which outputs are safe for patient view and which require clinician review.","takeaway":"Data can guide conversation, not replace care.","notes":"Avoid claiming AI can diagnose posture or prescribe rehab independently."},{"chapter":"Act 6 — Vestibular","accent":"#16a34a","img":"physio-ai.webp","title":"Vestibular support: patterns, diaries and follow-up questions","lead":"AI can support vestibular care by organising symptom diaries and preparing education drafts, not by diagnosing conditions.","story":"AI can say: the diary often mentions dizziness after standing. It should not say: this patient has a specific vestibular diagnosis.","points":["Summarise symptom diary","Group common triggers","List missing questions","Draft patient-friendly explanation"],"demo":"Summarise synthetic vestibular diary into triggers, duration and follow-up questions.","exercise":"Mark unsafe outputs that cross into diagnosis.","takeaway":"Clinical vestibular training and AI workflow training should stay separate but complementary.","notes":"This responds directly to their request for vestibular training."},{"chapter":"Act 7 — Clinical limits","accent":"#334155","img":"governance-ai.webp","title":"Clinical decision support: prediction is not permission to act","lead":"Risk prediction and CDSS can be valuable, but they need validation, monitoring, workflow control and accountability.","story":"A weather forecast helps you carry an umbrella. It should not automatically lock the hospital doors. Prediction supports decisions; it should not silently make them.","points":["Bias can affect local populations","Model drift can reduce accuracy","Alerts can create fatigue","Responsibility stays in approved workflow"],"demo":"Compare a helpful advisory output with an unsafe treatment recommendation.","exercise":"Classify CDSS examples as advisory, interruptive or unacceptable.","takeaway":"High-risk AI needs formal governance before deployment.","notes":"This prevents overreach."},{"chapter":"Act 7 — Clinical limits","accent":"#334155","img":"governance-ai.webp","title":"The dangerous sentence: 'AI said so'","lead":"AI output should never become the reason by itself in a clinical decision.","story":"If a junior staff member says 'because the computer said so', the manager should ask: where is the evidence, who reviewed it, and what rule allows it?","points":["Ask for evidence source","Ask for reviewer name","Ask for policy basis","Ask for exception handling"],"demo":"Take an AI answer and force it into an evidence table.","exercise":"Participants identify what evidence is missing from a sample AI output.","takeaway":"AI output needs evidence, reviewer and policy context.","notes":"This is a simple phrase they can remember."},{"chapter":"Act 8 — Vendors","accent":"#0f766e","img":"vendor-ai.webp","title":"The best AI vendor is not always the smartest model","lead":"Hospitals should choose by privacy, auditability, integration, cost, support, exit plan and clinical risk fit.","story":"A sports car is powerful, but not useful if the hospital needs an ambulance with records, safety checks, maintenance and trained drivers.","points":["Data used for training?","Retention and deletion?","SSO, MFA, RBAC and audit logs?","Contract, support and exit plan?"],"demo":"Score a fake vendor response with the evaluation prompt.","exercise":"Each group writes five procurement questions before choosing a tool.","takeaway":"Buy controls, not just intelligence.","notes":"This is the main vendor evaluation message."},{"chapter":"Act 8 — Vendors","accent":"#0f766e","img":"vendor-ai.webp","title":"Vendor landscape: what each option is usually good for","lead":"No single platform wins every use case. The correct choice depends on data sensitivity, integration and operating maturity.","story":"A hospital has many tools: ambulance, wheelchair, scalpel, thermometer. Each has a job. AI platforms work the same way.","points":["OpenAI: strong general productivity and drafting","Claude: long-document review and careful reasoning","Azure Foundry/OpenAI: Microsoft enterprise integration","Bedrock/Gemini: cloud-native platform choices"],"demo":"Compare the same workflow across SaaS and private cloud assumptions.","exercise":"Pick best-fit platforms for translation, policy chatbot and radiology pilot readiness.","takeaway":"Choose platform by use case, not brand preference.","notes":"Keep it neutral and practical."},{"chapter":"Act 8 — Vendors","accent":"#0f766e","img":"vendor-ai.webp","title":"China models and self-hosted models: useful, but not free magic","lead":"DeepSeek, Qwen, Kimi, Baichuan, Llama, Mistral and Gemma may be attractive, but hospitals must evaluate hosting, support, security and governance burden.","story":"A free puppy is not free if you must feed it, train it, clean after it and take it to the vet. Self-hosted AI has the same hidden work.","points":["Who hosts and patches it?","Where does data stay?","Who monitors abuse and drift?","Who pays for GPU, security and operations?"],"demo":"Compare SaaS vs self-hosted using cost, control and operational burden.","exercise":"Decide when self-hosting is justified and when it is overkill.","takeaway":"Self-hosted AI gives control only if the hospital can operate it well.","notes":"Important for budget-conscious nonprofit setting."},{"chapter":"Act 8 — Vendors","accent":"#0f766e","img":"vendor-ai.webp","title":"Deployment choices: SaaS, private cloud, on-prem or hybrid","lead":"Deployment model should follow data sensitivity and operational capability.","story":"Not every patient needs ICU. Not every AI use case needs on-prem. Match the environment to the risk.","points":["SaaS: fastest for low-risk productivity","Private cloud: stronger control and integration","On-prem/self-hosted: highest control and highest burden","Hybrid: split low-risk and sensitive use cases"],"demo":"Use three scenarios and choose deployment paths.","exercise":"Groups choose deployment for translation, radiology triage and policy chatbot.","takeaway":"The safest design is the one the hospital can actually operate.","notes":"This makes the vendor section actionable."},{"chapter":"Act 9 — Capability","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"The hospital should build an AI champion network","lead":"Self-sufficiency needs people, not only tools. Each unit needs someone who can spot use cases, apply rules and escalate risk.","story":"A hospital does not rely on one person to know fire safety. Everyone learns basics, and trained ward champions guide others. AI needs the same pattern.","points":["One AI champion per unit","Shared prompt pack","Monthly use-case review","Escalation path for red-risk ideas"],"demo":"Show the champion workflow: idea → risk score → pilot → review → scale.","exercise":"Ask which roles should become AI champions in radiology, physio and operations.","takeaway":"Internal champions reduce dependency on consultants.","notes":"This is central to the user's stated direction."},{"chapter":"Act 9 — Capability","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"The 30-60-90 day roadmap","lead":"A nonprofit hospital can start small, learn fast and scale only what proves useful.","story":"Do not start by building a hospital AI skyscraper. Start by laying a safe floor: rules, templates, use cases and one pilot everyone understands.","points":["30 days: collect and risk-score use cases","60 days: run 2-3 low-risk pilots","90 days: review evidence and decide scale","After 90: evaluate vendors for justified needs"],"demo":"Show a pilot charter for translation, SOP drafting or physio progress summary.","exercise":"Each group drafts a one-page pilot.","takeaway":"Small controlled wins beat expensive uncontrolled ambition.","notes":"This should feel realistic for nonprofit constraints."},{"chapter":"Act 9 — Capability","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"Pilot selection: choose boring problems first","lead":"The best first pilots are often boring, repetitive and measurable.","story":"A good first bicycle route is flat and quiet. Do not choose a mountain road for day one.","points":["Frequent pain point","Low patient safety risk","Clear human reviewer","Easy success metric"],"demo":"Score five possible pilots and choose the top three.","exercise":"Each group nominates one boring but valuable pilot.","takeaway":"Boring pilots create trust and evidence.","notes":"This avoids over-ambitious clinical AI pilots."},{"chapter":"Act 9 — Capability","accent":"#246bfe","img":"hero-healthcare-ai.webp","title":"What the hospital should leave with after training","lead":"The output should not only be slides. Participants should leave with reusable working material.","story":"A training class without take-home tools is like giving someone a recipe verbally and asking them to remember every step.","points":["AI use-case register","Risk scoring sheet","Prompt pack","Vendor evaluation scorecard","Pilot charter template","Department checklist"],"demo":"Show each template and how it supports the next 90 days.","exercise":"Assign each template to an owner for post-training follow-up.","takeaway":"Templates turn one training session into repeatable capability.","notes":"This directly answers the user's goal."},{"chapter":"Closing","accent":"#111827","img":"hero-healthcare-ai.webp","title":"The final message for hospital leaders","lead":"AI adoption is not about using AI everywhere. It is knowing where it helps, where it can harm and how the hospital controls it.","story":"Before using AI, ask four questions: what data goes in, what output comes out, who checks it, and who owns the risk?","points":["AI should reduce friction","Humans keep accountability","Clinical AI requires stronger governance","Every pilot needs evidence"],"demo":"Close with the ladder: daily use → governance → pilots → vendor evaluation → scale.","exercise":"Ask each team to submit one safe pilot idea after the session.","takeaway":"Responsible AI is how hospitals move safely and independently.","notes":"End with confidence, not hype."}];const prompts={'Translation prompt':'You are a hospital patient education assistant. Translate the approved instruction into Malay, Mandarin and Tamil. Do not add new medical advice. Keep medication names unchanged. Add a final column called Terms needing human review. Text: [paste synthetic instruction]','Documentation prompt':'Convert this synthetic note into a structured handover with: Summary, Key facts, Open questions, Actions, Owner, Due date and Risk. Do not infer facts that are not stated. Note: [paste synthetic note]','SOP prompt':'Create an internal SOP draft from these process notes. Include purpose, scope, roles, steps, approvals, exceptions, audit evidence and training checklist. Put assumptions separately. Notes: [paste notes]','Radiology worklist prompt':'Use this synthetic radiology worklist. Simulate how AI abnormality flags might prioritise worklist order. This is operational simulation only, not diagnosis. Keep original arrival time visible and explain any movement. Data: [paste CSV]','Physio progress prompt':'Summarise this synthetic physiotherapy progress data for clinician review. Output: trend summary, missing data, patient-friendly explanation and questions for next session. Do not diagnose or change treatment. Data: [paste CSV]','Vestibular diary prompt':'Summarise this synthetic vestibular symptom diary. Output: common triggers, duration pattern, fall risk signals, missing questions for clinician and patient-friendly summary. Do not diagnose. Diary: [paste diary]','Vendor evaluation prompt':'Act as a hospital AI procurement reviewer. Score this vendor response 1-5 across data training, retention, SSO/MFA, audit logs, DPA, data residency, model updates, downtime, cost and exit plan. Include follow-up questions. Vendor response: [paste response]'};const stage=document.getElementById('stage');function cardList(items){return items.map(x=>`<div class="card">${x}</div>`).join('')}slides.forEach((s,idx)=>{stage.insertAdjacentHTML('beforeend',`<section class="slide" data-chapter="${s.chapter}" style="--accent:${s.accent}"><div class="frame"><div><span class="kicker">${s.chapter}</span><h1>${s.title}</h1><p class="lead">${s.lead}</p><div class="story"><b>Story for the room</b><p>${s.story}</p></div><div class="grid">${cardList(s.points)}</div></div><aside class="side"><div class="visual"><img src="${A+s.img}" alt="${s.title}"></div><div class="demo"><b>Live demo</b><p>${s.demo}</p></div><div class="exercise"><b>Room exercise</b><p>${s.exercise}</p></div><div class="take"><b>Manager takeaway</b><p>${s.takeaway}</p></div></aside></div></section>`)});const nav=document.getElementById('nav');[...new Map(slides.map(s=>[s.chapter,s])).values()].forEach(s=>nav.insertAdjacentHTML('beforeend',`<button style="--c:${s.accent}" data-ch="${s.chapter}">${s.chapter}</button>`));const slideEls=[...document.querySelectorAll('.slide')],count=document.getElementById('count'),notes=document.getElementById('notes'),noteText=document.getElementById('noteText'),drawer=document.getElementById('drawer');let i=0;function show(n){i=Math.max(0,Math.min(slideEls.length-1,n));slideEls.forEach((s,k)=>s.classList.toggle('active',k===i));count.textContent=(i+1)+' / '+slideEls.length;noteText.textContent=slides[i].notes||'';location.hash='slide-'+String(i+1).padStart(2,'0')}function next(){show(i+1)}function prev(){show(i-1)}document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('notesBtn').onclick=()=>notes.classList.toggle('open');document.getElementById('demoBtn').onclick=()=>drawer.classList.add('open');document.getElementById('closeDrawer').onclick=()=>drawer.classList.remove('open');document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{const n=slides.findIndex(s=>s.chapter===b.dataset.ch);if(n>=0)show(n)});const sel=document.getElementById('promptSelect'),pre=document.getElementById('promptText');Object.keys(prompts).forEach(k=>sel.insertAdjacentHTML('beforeend',`<option>${k}</option>`));function loadPrompt(){pre.textContent=prompts[sel.value]}sel.onchange=loadPrompt;loadPrompt();document.getElementById('copyPrompt').onclick=async()=>{try{await navigator.clipboard.writeText(pre.textContent)}catch(e){}};document.addEventListener('keydown',e=>{if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();if(e.key.toLowerCase()==='n')notes.classList.toggle('open');if(e.key.toLowerCase()==='d')drawer.classList.toggle('open');if(e.key.toLowerCase()==='p')window.print()});const m=(location.hash||'').match(/slide-(\d+)/);if(m)i=Number(m[1])-1;show(i);</script></body></html>
