<title>Practical AI in Healthcare — Hospital Demo Deck</title>
<meta name="description" content="Story-led hospital AI training deck with practical demos, governance boundaries, radiology readiness, physiotherapy support and AI vendor evaluation.">
<link rel="preload" as="image" href="assets/hero-healthcare-ai.webp">
<style>
:root{--paper:#fffdf7;--cream:#f6f1e7;--ink:#111827;--muted:#64748b;--line:#ded4c5;--black:#111;--blue:#246bfe;--teal:#0f766e;--amber:#f59e0b;--red:#ef4444;--green:#16a34a;--violet:#7c3aed;--shadow:7px 7px 0 #111}*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,Aptos,"Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 10%,rgba(36,107,254,.12),transparent 28%),radial-gradient(circle at 90% 2%,rgba(15,118,110,.12),transparent 25%),linear-gradient(180deg,#fffaf1 0,var(--cream) 100%);overflow:hidden}.deck{height:100vh;display:grid;grid-template-rows:66px 1fr 60px}.top{display:flex;justify-content:space-between;align-items:center;padding:12px 22px;border-bottom:2px solid var(--black);background:rgba(255,253,247,.94);backdrop-filter:blur(8px)}.brand{display:flex;align-items:center;gap:10px;font-weight:1000}.mark{width:40px;height:40px;border:2px solid var(--black);border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--teal));box-shadow:3px 3px 0 var(--black);color:white;display:grid;place-items:center}.tag{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.top button,.nav button,.drawer button{border:2px solid var(--black);border-radius:999px;background:#fff;padding:8px 12px;font-weight:900;box-shadow:2px 2px 0 var(--black);cursor:pointer}.stage{position:relative;overflow:hidden}.slide{position:absolute;inset:0;display:none;padding:26px}.slide.active{display:block;animation:in .22s ease}@keyframes in{from{opacity:.2;transform:translateX(20px)}to{opacity:1;transform:none}}.frame{height:100%;display:grid;grid-template-columns:minmax(0,1.04fr) minmax(360px,.96fr);gap:22px;border:2px solid var(--black);border-radius:28px;background:rgba(255,253,247,.96);box-shadow:var(--shadow);padding:24px}.slide.full .frame{grid-template-columns:1fr}.kicker{display:inline-flex;align-items:center;gap:8px;border:2px solid var(--black);border-radius:999px;background:var(--accent);color:white;padding:8px 12px;font-size:13px;font-weight:1000;box-shadow:3px 3px 0 var(--black);text-transform:uppercase;letter-spacing:.06em}h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(40px,4.6vw,72px);line-height:.94;letter-spacing:-.04em;margin:18px 0 13px}.lead{font-size:23px;line-height:1.32;color:#2d3748;margin:0 0 16px}.story{border:2px solid var(--black);border-radius:18px;background:linear-gradient(135deg,#fff,#fff3dc);box-shadow:4px 4px 0 var(--black);padding:15px 17px;margin:12px 0 14px}.story b,.demo b,.exercise b,.take b{display:block;color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;font-weight:1000}.story p,.demo p,.exercise p,.take p{margin:0;font-size:17px;line-height:1.42}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{border:1.5px solid var(--line);border-radius:15px;background:white;padding:12px 13px;font-size:16px;font-weight:760;line-height:1.32}.card:before{content:"";display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--accent);margin-right:8px}.side{display:grid;grid-template-rows:1fr auto auto auto;gap:12px;min-height:0}.visual{position:relative;overflow:hidden;border:2px solid var(--black);border-radius:22px;background:#111827;box-shadow:5px 5px 0 var(--black);min-height:260px}.visual img{width:100%;height:100%;object-fit:cover;display:block}.visual:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 40%),linear-gradient(180deg,transparent 68%,rgba(0,0,0,.18));pointer-events:none}.demo,.exercise{border:1.5px solid var(--line);border-radius:18px;background:#fff;padding:13px 15px}.exercise{background:#fff7e6}.take{border:2px solid var(--black);border-radius:18px;background:#111827;color:#fff;padding:13px 15px}.take b{color:#93c5fd}.take p{color:#f8fafc;font-weight:760}.bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);background:rgba(255,253,247,.86);padding:10px 18px}.nav{display:flex;gap:7px;overflow:auto;max-width:74vw}.nav button{box-shadow:none;font-size:12px;color:var(--c);border-color:var(--c)}.counter{font-weight:900;color:var(--muted);font-variant-numeric:tabular-nums}.notes{position:fixed;right:18px;top:84px;width:min(520px,calc(100vw - 36px));max-height:72vh;overflow:auto;background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);padding:16px;display:none;z-index:20}.notes.open{display:block}.notes b{color:var(--teal)}.drawer{position:fixed;right:18px;top:84px;bottom:72px;width:min(620px,calc(100vw - 36px));background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);display:none;z-index:21;grid-template-rows:auto auto 1fr auto;overflow:hidden}.drawer.open{display:grid}.drawer header{background:#111827;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.drawer h2{margin:0}.drawer select{margin:14px;border:2px solid var(--black);border-radius:12px;padding:10px;font-weight:900}.drawer pre{margin:0 14px 14px;white-space:pre-wrap;overflow:auto;background:#0b1220;color:#e5e7eb;border-radius:16px;padding:16px;font-size:13px;line-height:1.45}.drawer .actions{padding:0 14px 14px;display:flex;gap:10px}.table{width:100%;border-collapse:collapse;background:#fff;border:2px solid var(--black);border-radius:14px;overflow:hidden}.table th,.table td{padding:11px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:15px}.table th{background:#f1f5f9;text-transform:uppercase;font-size:12px;letter-spacing:.06em}.table tr:last-child td{border-bottom:0}.small{font-size:14px;color:var(--muted);font-weight:700;margin-top:10px}@media(max-width:980px){body{overflow:auto}.deck{height:auto;min-height:100vh}.slide{position:relative;display:block!important;padding:14px}.frame{height:auto;grid-template-columns:1fr}.side{grid-template-rows:auto}.bottom,.top{position:sticky}.grid{grid-template-columns:1fr}.visual{min-height:260px}.nav{display:none}}@media print{body{overflow:visible;background:white}.top,.bottom,.notes,.drawer{display:none!important}.deck{display:block;height:auto}.slide{position:relative;display:block!important;page-break-after:always;height:100vh}.frame{box-shadow:none}.visual,.frame{border-color:#111}}
</style>
</head>
<body>
<div class="deck">
  <div class="top"><div class="brand"><div class="mark">+</div><div>Practical AI in Healthcare<div class="tag">Hospital demo deck · Image-enhanced · Safe-by-design</div></div></div><div><button id="prev">←</button> <button id="next">→</button> <button id="notesBtn">Notes</button> <button id="demoBtn">Demo prompts</button></div></div>
  <main class="stage" id="stage"></main>
  <div class="bottom"><div class="nav" id="nav"></div><div class="counter" id="count">1 / 1</div></div>
</div>
<div class="notes" id="notes"><b>Trainer note</b><p id="noteText"></p></div>
<aside class="drawer" id="drawer"><header><h2>Demo prompt library</h2><button id="closeDrawer">Close</button></header><select id="promptSelect"></select><pre id="promptText"></pre><div class="actions"><button id="copyPrompt">Copy</button><button onclick="window.print()">Print / Save PDF</button></div></aside>
<script>
const A='assets/';
const slides=[
{c:'Opening',a:'#246bfe',img:'hero-healthcare-ai.webp',t:'AI should help the hospital help itself',lead:'This is not a tool demo. It is a practical training journey for managers, radiology, physiotherapy and operations.',story:'Think of AI like a very fast intern. Useful, tireless, and sometimes confidently wrong. The manager gives clear work, checks output, and never lets the intern make clinical decisions alone.',pts:['Start with low-risk daily work','Protect patient data first','Use AI to draft, not decide','Build pilots before procurement'],demo:'Show the AI translation before/after example using synthetic discharge instructions.',ex:'Ask participants: which repeated task wastes the most time every week?',take:'Capability first. Technology purchase second.',note:'Open with the hospital’s real experience: simple translation created excitement because it solved a real pain. The next step is controlled capability.'},
{c:'Opening',a:'#246bfe',img:'hero-healthcare-ai.webp',t:'What this session is — and is not',lead:'A practical enablement session, not a clinical diagnosis class or vendor sales pitch.',story:'Healthcare AI is like giving staff a new vehicle. Before driving fast, everyone needs road rules, mirrors, brakes, and a destination.',pts:['Practical workflow training','Demo-driven and scenario-based','Governance, safety and pilot planning','No autonomous clinical decision-making'],demo:'Show the risk ladder: low, medium, high, do-not-freestyle.',ex:'Classify three ideas: SOP drafting, radiology triage flag, AI treatment recommendation.',take:'Clear boundaries make the training safer and more credible.',note:'Set expectations clearly. This protects the hospital and the trainer.'},
{c:'Chapter 1',a:'#0f766e',img:'hero-healthcare-ai.webp',t:'AI is a pattern machine, not a brain',lead:'AI predicts useful answers from patterns. It can be excellent at language, structure and suggestions, but it does not understand patients like clinicians do.',story:'Imagine a child who read a giant library and became very good at guessing the next sentence. The child sounds smart, but still needs an adult to check safety.',pts:['Good at drafting and restructuring','Good at translation and plain language','Weak when facts are missing','Dangerous when treated as authority'],demo:'Ask AI to explain one hospital instruction at three reading levels.',ex:'Separate tasks into draft, analyse, decide and approve.',take:'AI can assist thinking, but it must not own clinical accountability.',note:'Use plain language. Avoid technical overload.'},
{c:'Chapter 1',a:'#0f766e',img:'translation-ai.webp',t:'Translation is the perfect first win',lead:'It is easy to understand, visibly useful, and immediately relevant in Malaysian healthcare settings.',story:'A small wrong word in a restaurant menu is funny. A small wrong word in medication instructions can become harm. AI should draft; staff should approve.',pts:['Use approved source text','Ask AI to flag uncertain terms','Keep medication names unchanged','Route final output to human review'],demo:'Translate a synthetic discharge instruction into Malay, Mandarin and Tamil with a review column.',ex:'Participants mark which phrases require clinical review.',take:'Translation is low-risk only when source text and review are controlled.',note:'Connect excitement to safety. Translation is a strong first win but still needs review.'},
{c:'Chapter 2',a:'#ef4444',img:'translation-ai.webp',t:'A good prompt is a tiny SOP',lead:'Bad prompts ask for answers. Good prompts define role, task, data boundary, output format, review rules and stop conditions.',story:'If you tell a child “clean the room”, results vary. If you say “books on shelf, toys in box, dirty clothes in basket”, output improves.',pts:['Role: who should AI act as?','Task: what should it produce?','Boundary: what must it not do?','Format: how should it return output?'],demo:'Rewrite a vague prompt into a safe healthcare prompt.',ex:'Each participant writes one prompt for their unit.',take:'Prompting is workflow control, not wordplay.',note:'Teach prompting as instruction design. This resonates with SOP-minded managers.'},
{c:'Chapter 3',a:'#f59e0b',img:'governance-ai.webp',t:'Do not feed patient data into random tools',lead:'Healthcare AI starts with data discipline: classification, retention, access, logs and ownership.',story:'Do not put a patient diary into a public suggestion box. Even if the answer is useful, privacy damage is already done.',pts:['Classify data before use','Use synthetic data for training','Confirm retention and training policy','Keep audit logs and ownership'],demo:'Show the same prompt before and after patient identifiers are removed.',ex:'Redact a synthetic patient note before using AI.',take:'No governance, no patient data.',note:'Make privacy non-negotiable. This is where cybersecurity basics become practical.'},
{c:'Chapter 3',a:'#f59e0b',img:'governance-ai.webp',t:'Use a simple AI risk ladder',lead:'Managers need a fast way to separate safe daily productivity from high-risk clinical AI.',story:'Traffic lights work because everyone understands them. The hospital needs the same for AI: green, yellow and red.',pts:['Green: admin drafts and meeting summaries','Yellow: patient-facing content and dashboards','Red: diagnosis, treatment, autonomous decisions','Every use case needs owner, reviewer and metric'],demo:'Risk-score five hospital ideas live.',ex:'Groups classify translation, SOP drafting, radiology triage, CDSS and physio dashboard.',take:'Governance should be usable by busy staff, not only IT.',note:'Governance must feel practical, not bureaucratic.'},
{c:'Chapter 4',a:'#7c3aed',img:'hero-healthcare-ai.webp',t:'Start where AI helps without touching diagnosis',lead:'The safest early value is in admin, communication, documentation structure, education material, audit preparation and workflow clean-up.',story:'Before buying a robot surgeon, fix the paperwork traffic jam. AI can help clear the road so clinical teams spend less time formatting and more time caring.',pts:['SOP drafts and checklists','Incident or complaint summaries','Patient instruction drafts','Excel cleanup and dashboard ideas'],demo:'Convert messy synthetic process notes into an SOP draft.',ex:'Map one current workflow and identify the AI assist point.',take:'Automation should remove friction, not accountability.',note:'This is the strongest common training area for all 40 participants.'},
{c:'Chapter 5',a:'#0369a1',img:'radiology-ai.webp',t:'Radiology AI is not “AI reads the scan”',lead:'For managers, the core issue is how AI changes PACS/RIS workflow, turnaround time, escalation, review and accountability.',story:'AI in radiology is like a traffic light at a busy junction. If it works, urgent cases move faster. If it is wrong, the wrong cars get priority.',pts:['Worklist prioritisation','Critical finding flagging','Reporting turnaround time','False positive and false negative review'],demo:'Use synthetic radiology worklist CSV to simulate AI triage ordering.',ex:'Define what happens when AI flags a case as urgent.',take:'Evaluate and govern radiology AI; do not train AI to diagnose independently.',note:'Keep the boundary clear. This is manager readiness, not image interpretation training.'},
{c:'Chapter 5',a:'#0369a1',img:'radiology-ai.webp',t:'Radiology manager checklist',lead:'The safest radiology AI pilot starts with workflow questions before vendor claims.',story:'A smoke alarm is useful only when people know who responds, how fast, and what happens if it fails.',pts:['Where does AI sit in PACS/RIS?','Who sees the AI flag?','How are overrides reviewed?','What happens during downtime?'],demo:'Open a mock worklist and show how priority changes affect queue order.',ex:'Design the escalation path for one AI-flagged case.',take:'Radiology AI is a workflow and governance project before it is a technology project.',note:'Give managers questions they can use immediately with vendors or internal teams.'},
{c:'Chapter 6',a:'#16a34a',img:'physio-ai.webp',t:'Physiotherapy AI: coach assistant, not therapist replacement',lead:'Good physio AI supports documentation, exercise explanation, progress tracking, adherence and pattern review.',story:'AI is like a scoreboard at sports practice. It can show progress, but the coach still decides how to train safely.',pts:['Summarise progress notes','Generate patient-friendly exercise instructions','Review adherence patterns','Prepare questions for next session'],demo:'Summarise synthetic rehab progress data into clinician review notes.',ex:'Design a patient progress dashboard using non-sensitive fields.',take:'AI should make progress visible, not decide therapy.',note:'Physio demos can be more hands-on because they can use synthetic movement and progress data.'},
{c:'Chapter 6',a:'#16a34a',img:'physio-ai.webp',t:'Vestibular support: AI helps with patterns, not diagnosis',lead:'AI can summarise symptom diaries, organise triggers, prepare education drafts and highlight missing information for clinician review.',story:'AI can say “the diary often mentions dizziness after standing.” It should not conclude a diagnosis without approved clinical workflow.',pts:['Symptom diary summary','Trigger pattern list','Patient education draft','Missing question checklist'],demo:'Summarise a synthetic vestibular diary into triggers, duration and follow-up questions.',ex:'Mark which outputs are safe and which need clinical judgement.',take:'Clinical training and AI training should support each other, not blur roles.',note:'Separate vestibular clinical CPD from AI workflow support.'},
{c:'Chapter 7',a:'#334155',img:'governance-ai.webp',t:'Prediction is not permission to act',lead:'Clinical decision support can be valuable, but it needs validation, workflow control, monitoring and accountability.',story:'A weather forecast can help you carry an umbrella. It should not automatically lock the hospital doors. Prediction supports decisions; it should not silently make them.',pts:['Bias can affect local populations','Model drift can reduce accuracy','Alerts can create fatigue','Responsibility stays in approved workflow'],demo:'Compare a helpful AI risk explanation with an unsafe treatment recommendation.',ex:'Classify CDSS examples as advisory, interruptive or unacceptable.',take:'High-risk AI needs formal governance before deployment.',note:'Do not let participants think prediction models are simple productivity tools.'},
{c:'Chapter 8',a:'#0f766e',img:'vendor-ai.webp',t:'The best AI vendor is not always the smartest model',lead:'For hospitals, privacy, audit logs, data residency, access control, integration, cost and exit plan matter as much as raw model quality.',story:'A sports car is powerful, but not useful if the hospital needs an ambulance with records, safety checks, maintenance and trained drivers.',pts:['Data used for training?','Retention and deletion?','SSO, MFA, RBAC and audit logs?','Contract, support and exit plan?'],demo:'Score a fake vendor response with the evaluation prompt.',ex:'Each group asks five procurement questions before choosing a tool.',take:'Buy controls, not just intelligence.',note:'Keep vendor evaluation managerial and practical.'},
{c:'Chapter 8',a:'#0f766e',img:'vendor-ai.webp',t:'Platform options: choose by risk and capability',lead:'Different AI platforms solve different problems. The hospital should choose by data sensitivity, governance maturity, integration and operating skill.',story:'Do not buy the biggest toolbox first. Buy the tool that fits the job and the team that will maintain it.',pts:['OpenAI / ChatGPT: general productivity and drafting','Claude: long documents and careful review','Azure Foundry: Microsoft ecosystem and enterprise controls','Bedrock / Gemini / China / self-hosted: compare case by case'],demo:'Use the vendor scorecard across SaaS, private cloud and self-hosted choices.',ex:'Pick a deployment model for translation, radiology triage and policy chatbot.',take:'The right answer depends on risk, not hype.',note:'Mention China and self-hosted options neutrally: useful, but require legal/security/ops review.'},
{c:'Chapter 9',a:'#246bfe',img:'hero-healthcare-ai.webp',t:'The 30-60-90 day roadmap',lead:'A nonprofit hospital can build capability step by step using training, templates, synthetic demos and small governed pilots.',story:'Do not start by building a hospital AI skyscraper. Start by laying a safe floor: rules, templates, use cases and one pilot everyone understands.',pts:['30 days: identify and risk-score use cases','60 days: run 2-3 low-risk pilots','90 days: review evidence and decide next step','Scale only when ownership is clear'],demo:'Show a pilot charter for translation, SOP drafting or physio progress summary.',ex:'Each group drafts a one-page pilot.',take:'Small controlled wins beat expensive uncontrolled ambition.',note:'This is the self-sufficiency message.'},
{c:'Closing',a:'#111827',img:'hero-healthcare-ai.webp',t:'The final message for hospital leaders',lead:'AI adoption is not about using AI everywhere. It is knowing where it helps, where it can harm, and how the hospital controls it.',story:'Before using AI, ask four questions: what data goes in, what output comes out, who checks it, and who owns the risk.',pts:['AI should reduce friction','Humans keep accountability','Clinical AI requires stronger governance','Every pilot needs evidence'],demo:'Close with the ladder: daily use → governance → pilots → vendor evaluation → scale.',ex:'Ask each team to submit one safe pilot idea after the session.',take:'Responsible AI is not slower. It is how hospitals move safely.',note:'End with capability-building, not procurement.'}
];
const prompts={
'Translation prompt':'You are a hospital patient education assistant. Translate the approved instruction into Malay, Mandarin and Tamil. Do not add new medical advice. Keep medication names unchanged. Add a final column called Terms needing human review. Text: [paste synthetic instruction]',
'Documentation prompt':'Convert this synthetic note into a structured handover with: Summary, Key facts, Open questions, Actions, Owner, Due date and Risk. Do not infer facts that are not stated. Note: [paste synthetic note]',
'Radiology worklist prompt':'Use this synthetic radiology worklist. Simulate how AI abnormality flags might prioritise worklist order. This is operational simulation only, not diagnosis. Keep original arrival time visible and explain any movement. Data: [paste CSV]',
'Physio progress prompt':'Summarise this synthetic physiotherapy progress data for clinician review. Output: trend summary, missing data, patient-friendly explanation and questions for next session. Do not diagnose or change treatment. Data: [paste CSV]',
'Vestibular diary prompt':'Summarise this synthetic vestibular symptom diary. Output: common triggers, duration pattern, fall risk signals, missing questions for clinician and patient-friendly summary. Do not diagnose. Diary: [paste diary]',
'Vendor evaluation prompt':'Act as a hospital AI procurement reviewer. Score this vendor response 1-5 across data training, retention, SSO/MFA, audit logs, DPA, data residency, model updates, downtime, cost and exit plan. Include follow-up questions. Vendor response: [paste response]'
};
const stage=document.getElementById('stage');
function cardList(items){return items.map(x=>`<div class="card">${x}</div>`).join('')}
slides.forEach((s,idx)=>{stage.insertAdjacentHTML('beforeend',`<section class="slide" data-chapter="${s.c}" style="--accent:${s.a}"><div class="frame"><div><span class="kicker">${s.c}</span><h1>${s.t}</h1><p class="lead">${s.lead}</p><div class="story"><b>Story for the room</b><p>${s.story}</p></div><div class="grid">${cardList(s.pts)}</div></div><aside class="side"><div class="visual"><img src="${A+s.img}" alt="${s.t}"></div><div class="demo"><b>Demo</b><p>${s.demo}</p></div><div class="exercise"><b>Exercise</b><p>${s.ex}</p></div><div class="take"><b>Takeaway</b><p>${s.take}</p></div></aside></div></section>`) });
const nav=document.getElementById('nav');[...new Set(slides.map(s=>s.c))].forEach(ch=>{const s=slides.find(x=>x.c===ch);nav.insertAdjacentHTML('beforeend',`<button style="--c:${s.a}" data-ch="${ch}">${ch}</button>`) });
const slideEls=[...document.querySelectorAll('.slide')], count=document.getElementById('count'), notes=document.getElementById('notes'), noteText=document.getElementById('noteText'), drawer=document.getElementById('drawer');let i=0;
function show(n){i=Math.max(0,Math.min(slideEls.length-1,n));slideEls.forEach((s,k)=>s.classList.toggle('active',k===i));count.textContent=(i+1)+' / '+slideEls.length;noteText.textContent=slides[i].note||'';location.hash='slide-'+String(i+1).padStart(2,'0')}
function next(){show(i+1)}function prev(){show(i-1)}document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('notesBtn').onclick=()=>notes.classList.toggle('open');document.getElementById('demoBtn').onclick=()=>drawer.classList.add('open');document.getElementById('closeDrawer').onclick=()=>drawer.classList.remove('open');
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{const n=slides.findIndex(s=>s.c===b.dataset.ch);if(n>=0)show(n)});
const sel=document.getElementById('promptSelect'), pre=document.getElementById('promptText');Object.keys(prompts).forEach(k=>sel.insertAdjacentHTML('beforeend',`<option>${k}</option>`));function loadPrompt(){pre.textContent=prompts[sel.value]}sel.onchange=loadPrompt;loadPrompt();document.getElementById('copyPrompt').onclick=async()=>{try{await navigator.clipboard.writeText(pre.textContent)}catch(e){}};
document.addEventListener('keydown',e=>{if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();if(e.key.toLowerCase()==='n')notes.classList.toggle('open');if(e.key.toLowerCase()==='d')drawer.classList.toggle('open');if(e.key.toLowerCase()==='p')window.print()});const m=(location.hash||'').match(/slide-(\d+)/);if(m)i=Number(m[1])-1;show(i);
</script>
</body>
</html>
