pacity:1;transform:none}}.frame{height:100%;display:grid;grid-template-columns:minmax(0,1fr) minmax(440px,.82fr);gap:20px;border:2px solid var(--black);border-radius:28px;background:rgba(255,253,247,.97);box-shadow:var(--shadow);padding:22px}.main{min-width:0;overflow:auto;padding-right:4px}.kicker{display:inline-flex;align-items:center;border:2px solid var(--black);border-radius:999px;background:var(--accent);color:white;padding:8px 12px;font-size:12px;font-weight:1000;box-shadow:3px 3px 0 var(--black);text-transform:uppercase;letter-spacing:.06em}h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(34px,4vw,58px);line-height:.96;letter-spacing:-.04em;margin:14px 0 10px}.lead{font-size:20px;line-height:1.32;color:#2d3748;margin:0 0 12px}.section{border:1.5px solid var(--line);border-radius:16px;background:white;padding:13px 15px;margin:9px 0;box-shadow:0 6px 16px rgba(15,23,42,.04)}.section h3{margin:0 0 7px;font-size:14px;text-transform:uppercase;letter-spacing:.07em;color:var(--accent)}.section p{margin:0;font-size:16px;line-height:1.42}.section ul{margin:0;padding-left:18px}.section li{font-size:15.5px;line-height:1.36;margin:4px 0}.example{background:#fff7e6;border-color:#f4d28b}.demo{background:#eef7ff;border-color:#b6d8ff}.practice{background:#f0fdf4;border-color:#b9e8c5}.take{background:#111827;color:#fff;border:2px solid #111827}.take h3{color:#93c5fd}.take p{color:#f8fafc;font-weight:780}.side{display:grid;grid-template-rows:44% 1fr;gap:14px;min-height:0}.visual{position:relative;overflow:hidden;border:2px solid var(--black);border-radius:22px;background:#111827;box-shadow:5px 5px 0 var(--black)}.visual img{width:100%;height:100%;object-fit:cover;display:block}.visual:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 40%),linear-gradient(180deg,transparent 70%,rgba(0,0,0,.18));pointer-events:none}.sample{display:grid;gap:9px;overflow:auto}.sample pre,.drawer pre{white-space:pre-wrap;background:#0b1220;color:#e5e7eb;border-radius:14px;padding:12px;font-size:12.5px;line-height:1.42;margin:0;border:1px solid rgba(255,255,255,.12)}.sample table{width:100%;border-collapse:collapse;background:#fff;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;font-size:12.5px}.sample th,.sample td{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:top}.sample th{background:#f1f5f9;font-size:11px;text-transform:uppercase}.sample tr:last-child td{border-bottom:0}.bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);background:rgba(255,253,247,.86);padding:10px 18px}.nav{display:flex;gap:7px;overflow:auto;max-width:74vw}.nav button{box-shadow:none;font-size:12px;color:var(--c);border-color:var(--c)}.counter{font-weight:900;color:var(--muted);font-variant-numeric:tabular-nums}.notes{position:fixed;right:18px;top:84px;width:min(540px,calc(100vw - 36px));max-height:72vh;overflow:auto;background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);padding:16px;display:none;z-index:20}.notes.open{display:block}.notes b{color:var(--teal)}.drawer{position:fixed;right:18px;top:84px;bottom:72px;width:min(650px,calc(100vw - 36px));background:#fffdf7;border:2px solid var(--black);border-radius:20px;box-shadow:var(--shadow);display:none;z-index:21;grid-template-rows:auto auto 1fr auto;overflow:hidden}.drawer.open{display:grid}.drawer header{background:#111827;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.drawer h2{margin:0}.drawer select{margin:14px;border:2px solid var(--black);border-radius:12px;padding:10px;font-weight:900}.drawer .actions{padding:0 14px 14px;display:flex;gap:10px}@media(max-width:1050px){body{overflow:auto}.deck{height:auto;min-height:100vh}.slide{position:relative;display:block!important;padding:14px}.frame{height:auto;grid-template-columns:1fr}.side{grid-template-rows:auto}.visual{min-height:260px}.bottom,.top{position:sticky}.nav{display:none}}@media print{body{overflow:visible;background:white}.top,.bottom,.notes,.drawer{display:none!important}.deck{display:block;height:auto}.slide{position:relative;display:block!important;page-break-after:always;height:100vh}.frame{box-shadow:none}.visual,.frame{border-color:#111}}</style></head><body><div class="deck"><div class="top"><div class="brand"><div class="mark">+</div><div>Practical AI in Healthcare<div class="tag">Training deck · explanations · demos · real scenarios</div></div></div><div><button id="prev">←</button> <button id="next">→</button> <button id="notesBtn">Notes</button> <button id="demoBtn">Demo prompts</button></div></div><main class="stage" id="stage"></main><div class="bottom"><div class="nav" id="nav"></div><div class="counter" id="count">1 / 1</div></div></div><div class="notes" id="notes"><b>Trainer note</b><p id="noteText"></p></div><aside class="drawer" id="drawer"><header><h2>Demo prompt library</h2><button id="closeDrawer">Close</button></header><select id="promptSelect"></select><pre id="promptText"></pre><div class="actions"><button id="copyPrompt">Copy</button><button onclick="window.print()">Print / Save PDF</button></div></aside><script>const A='assets/';const slides=[
{ch:'Prologue',a:'#246bfe',img:'hero-healthcare-ai.webp',t:'Why the hospital is asking for the next AI training',lead:'The first training created excitement because people saw AI solve a real pain: translation. The next training must turn excitement into safe, repeatable capability.',explain:'This course treats AI as a hospital workflow tool, not a magic machine. The story starts with a simple daily problem, then expands into governance, prompting, radiology readiness, physiotherapy support, vendor evaluation and a 90-day adoption plan.',scenario:'A nurse receives English discharge instructions and needs Malay, Mandarin and Tamil versions. A manager needs an SOP draft. Radiology has a queue. Physio has progress notes. AI can help each area, but only if the hospital controls data, review and ownership.',example:'Journey map: 1) safe daily use → 2) prompt discipline → 3) department scenario → 4) risk score → 5) pilot charter → 6) vendor evaluation only when needed.',demo:'Open with a 5-minute poll: “Where do you lose time?” Capture answers into an AI Use Case Register.',practice:'Each table writes one workflow pain point and one possible risk if AI is used badly.',take:'The goal is not to make the hospital dependent on AI vendors. The goal is to help staff build internal AI judgement.',sample:'<pre>Use-case register row\nDepartment: Nursing\nProblem: Repeating discharge explanations in multiple languages\nAI assist: Draft translations from approved English text\nRisk: wrong medication instruction\nControl: nurse review + terms needing review column\nMetric: time saved + translation error review</pre>',notes:'The user wants story and completeness. Start with the actual reason the hospital came back: translation excited people because it was practical.'},
{ch:'Chapter 1 — AI basics',a:'#0f766e',img:'hero-healthcare-ai.webp',t:'AI in simple hospital language',lead:'AI is a pattern engine that drafts, structures and suggests. It is not a clinician, manager, radiologist or physiotherapist.',explain:'Generative AI predicts useful output based on patterns in language and data. It can write clearly, summarize messy notes, translate, create checklists and explain complex text. But it can also invent details, miss context, or sound confident when wrong.',scenario:'A ward clerk pastes messy notes into AI and asks for a handover. AI creates a clean summary. That is useful. But if AI adds “patient is stable” when the note never said that, it becomes unsafe.',example:'Safe task: “Turn these stated facts into a handover.” Unsafe task: “Tell me what is wrong with this patient.”',demo:'Show two prompts: one that invites guessing, one that forces AI to separate facts, assumptions and missing information.',practice:'Participants label tasks as Draft / Structure / Analyze / Decide / Approve.',take:'AI can help prepare work, but the hospital must decide who reviews and approves the output.',sample:'<pre>Unsafe: Summarize and tell me what to do next.\nSafer: Summarize only the stated facts. Put missing information under “Not provided”. Do not recommend diagnosis or treatment.</pre>',notes:'This slide gives people a mental model before tools.'},
{ch:'Chapter 1 — AI basics',a:'#0f766e',img:'translation-ai.webp',t:'Translation is the first practical win',lead:'Translation is exciting because everyone can see the value immediately. It saves time and improves patient understanding, but it must still be reviewed.',explain:'AI translation is stronger when the prompt includes audience, reading level, protected terms and a review column. In healthcare, the goal is not only fluent language. The goal is faithful, safe patient communication.',scenario:'Synthetic example: A patient is discharged after a minor procedure. The English instruction says: “Return immediately if you develop fever, chest pain, severe bleeding, or shortness of breath.” AI can translate this into multiple languages and flag terms needing clinical review.',example:'Good output should preserve warning symptoms, dosage, appointment dates, medication names and emergency instructions. It should not simplify away clinical meaning.',demo:'Use the translation prompt from the demo drawer. Paste a synthetic discharge instruction. Ask AI to output English | Malay | Mandarin | Tamil | Terms needing review.',practice:'Ask participants to highlight words that must not be changed freely: fever, dosage, severe bleeding, shortness of breath, follow-up date.',take:'Translation is a good first AI pilot because it is useful, measurable and controllable.',sample:'<table><tr><th>English source</th><th>AI task</th><th>Human review</th></tr><tr><td>Return immediately if you develop fever, chest pain, severe bleeding, or shortness of breath.</td><td>Translate into Malay, Mandarin and Tamil in simple patient language.</td><td>Review warning signs and clinical terms before use.</td></tr></table>',notes:'This is concrete and should be demoed live.'},
{ch:'Chapter 2 — Prompting',a:'#ef4444',img:'translation-ai.webp',t:'A prompt is a tiny SOP',lead:'Prompting is not magic wording. It is giving AI a controlled work instruction.',explain:'A good prompt tells AI its role, the task, what data it may use, what it must not do, what output format is required, and what uncertainty should look like. This is similar to writing a mini SOP for a junior assistant.',scenario:'A manager asks: “Write a patient instruction.” AI may invent details. A safer prompt says: “Using only the approved text below, rewrite it in simple language. Do not add clinical advice. Flag uncertain terms.”',example:'Prompt fields: Role / Context / Source text / Rules / Output format / Review flag.',demo:'Take a vague prompt from the room and rebuild it using the prompt formula.',practice:'Each table writes one safe prompt for their department using the formula.',take:'Prompt discipline reduces hallucination, rework and unsafe assumptions.',sample:'<pre>Prompt formula\nRole: You are a hospital documentation assistant.\nSource: Use only the text below.\nRules: Do not diagnose. Do not add clinical advice.\nOutput: Table with Summary, Missing Data, Human Review Needed.\nStop: If data is insufficient, say Not provided.</pre>',notes:'This is useful AI training content, not just concept.'},
{ch:'Chapter 2 — Prompting',a:'#ef4444',img:'translation-ai.webp',t:'Demo: turn messy notes into structured output',lead:'This is a safe, practical demo for every hospital unit.',explain:'Most departments have messy notes, chat messages, meeting minutes or handover text. AI can turn them into structured drafts. The safety rule is simple: AI may structure stated facts, but it must not invent missing facts.',scenario:'Synthetic note: “Patient came for follow-up. Complains dizziness after standing. Missed home exercises twice. Pain 3/10. Next session needs balance check. Daughter asked for home instruction in Mandarin.”',example:'AI output should create sections: Summary, Facts, Missing information, Action items, Human review needed.',demo:'Paste the note into AI with the documentation prompt. Ask participants to inspect whether AI added anything not stated.',practice:'Participants mark each output line as “stated fact”, “assumption”, or “needs review”.',take:'This is a practical workflow automation that can be used across departments with proper review.',sample:'<pre>Expected AI output\nSummary: Follow-up visit with dizziness after standing and missed home exercises.\nFacts: pain 3/10; missed exercises twice; next balance check needed.\nMissing: duration of dizziness, fall history, medication changes.\nAction: clinician to review balance risk and provide Mandarin home instruction draft.</pre>',notes:'This slide shows actual demo content.'},
{ch:'Chapter 3 — Governance',a:'#f59e0b',img:'governance-ai.webp',t:'The traffic light model for hospital AI',lead:'Managers need a simple way to know what can be tried, what needs caution and what must stop.',explain:'A traffic light model prevents every AI idea from being treated the same. Green use cases are low-risk productivity work. Yellow use cases touch patient-facing content or workflow prioritisation. Red use cases affect diagnosis, treatment, clinical decisions or sensitive data.',scenario:'Translation from approved text is usually Green/Yellow depending on whether it is patient-facing. AI diagnosis from symptoms is Red. Radiology abnormality detection is Red unless using an approved, governed tool.',example:'Green: meeting summary. Yellow: patient education draft. Red: treatment recommendation. Black line: real patient data in unapproved public AI tools.',demo:'Show five examples and ask participants to vote Green / Yellow / Red.',practice:'Each group classifies its own use case and writes one control for it.',take:'The traffic light model gives the hospital a shared AI risk language.',sample:'<table><tr><th>Use case</th><th>Risk</th><th>Control</th></tr><tr><td>Meeting summary</td><td>Green</td><td>Human review</td></tr><tr><td>Patient instruction draft</td><td>Yellow</td><td>Clinical review before use</td></tr><tr><td>AI suggests diagnosis</td><td>Red</td><td>Do not use without approved clinical system</td></tr></table>',notes:'Connect with cybersecurity: classification, ownership, auditability.'},
{ch:'Chapter 3 — Governance',a:'#f59e0b',img:'governance-ai.webp',t:'What a real AI use-case register looks like',lead:'A use-case register is how the hospital avoids shadow AI.',explain:'Without a register, departments may use different tools, upload different data, and apply different assumptions. A register gives visibility: who owns the use case, what data is used, what risk exists, and what metric proves value.',scenario:'Radiology wants AI worklist priority. Physio wants progress tracking. Admin wants SOP drafting. All three can be registered, risk-scored and routed differently.',example:'A good register entry includes department, problem, workflow step, data used, risk level, human reviewer, success metric and next action.',demo:'Fill one register row live for “approved patient instruction translation”.',practice:'Each department writes two rows: one low-risk and one high-risk idea.',take:'If it is not registered, it is not ready to scale.',sample:'<table><tr><th>Field</th><th>Example</th></tr><tr><td>Use case</td><td>Translate approved discharge instruction</td></tr><tr><td>Data</td><td>Approved generic text, no patient identifiers</td></tr><tr><td>Reviewer</td><td>Nurse educator / clinical owner</td></tr><tr><td>Metric</td><td>Time saved, review defects, patient comprehension feedback</td></tr></table>',notes:'This is the self-sufficiency piece the user asked for.'},
{ch:'Chapter 4 — Workflow',a:'#7c3aed',img:'hero-healthcare-ai.webp',t:'AI workflow automation: start with boring problems',lead:'The best first AI pilots are usually boring, repetitive and measurable.',explain:'Do not begin with diagnosis. Begin with work that consumes time but has clear review. Examples: SOP drafting, meeting summaries, complaint summaries, audit checklist creation, training quiz generation, patient education drafts and Excel cleanup.',scenario:'A manager has 12 different staff notes about a process. AI can turn them into a draft SOP with purpose, scope, roles, steps, exception handling and audit evidence. A human still approves the SOP.',example:'Before: scattered notes in email and WhatsApp. After: structured SOP draft plus assumptions list.',demo:'Paste messy process notes into the SOP prompt. Ask AI to create a draft and separate assumptions.',practice:'Participants bring one messy process from memory and outline it in five bullet points.',take:'AI should remove formatting burden, not remove process ownership.',sample:'<pre>Messy notes → SOP sections\n- Request comes from ward sister\n- Supervisor checks form\n- If urgent, call manager\n- Keep copy in shared folder\nAI output: Purpose, Scope, Roles, Procedure, Exception, Audit Evidence, Training Checklist</pre>',notes:'Make this practical for managers.'},
{ch:'Chapter 4 — Workflow',a:'#7c3aed',img:'hero-healthcare-ai.webp',t:'Workflow map before tool choice',lead:'Do not automate a workflow you cannot explain.',explain:'A workflow map shows trigger, input, AI assist point, human decision, output and evidence. This prevents random tool use and makes AI pilots measurable.',scenario:'Patient education workflow: doctor approves English source → AI drafts translations → nurse reviews flagged terms → final version stored → patient receives printed copy.',example:'The AI assist point is translation draft only. The approval point remains with clinical staff.',demo:'Draw the workflow on screen and mark where AI enters and exits.',practice:'Each group maps one workflow using six boxes: Trigger, Input, AI assist, Review, Output, Evidence.',take:'The workflow decides the tool, not the other way around.',sample:'<pre>Workflow map\nTrigger: request for patient instruction\nInput: approved English text\nAI assist: draft translations\nReview: nurse educator checks clinical terms\nOutput: approved multilingual handout\nEvidence: version + reviewer + date</pre>',notes:'This is a real training activity.'},
{ch:'Chapter 5 — Radiology',a:'#0369a1',img:'radiology-ai.webp',t:'Radiology AI readiness: manage the queue, not the diagnosis',lead:'For radiology managers, the practical training focus is workflow readiness: PACS/RIS impact, triage, escalation and metrics.',explain:'AI-assisted imaging tools may flag abnormality or prioritise cases. That can reduce turnaround time, but only if the workflow is designed. Who sees the flag? Does the worklist order change? What happens if AI is wrong? Who reviews overrides?',scenario:'Synthetic worklist: Chest X-ray arrived 08:01, CT head arrived 08:04, routine MRI arrived 08:06. AI flags possible pneumothorax on X-ray. The worklist moves it to the top and records “human review required”.',example:'This is not teaching AI to read X-rays. It is teaching managers how an AI flag affects operations and governance.',demo:'Use a synthetic worklist CSV and ask AI to reorder by urgency while keeping original arrival time visible.',practice:'Participants design the escalation path after an AI high-priority flag.',take:'Radiology AI is a workflow and governance project before it is a technology project.',sample:'<table><tr><th>Arrival</th><th>Study</th><th>AI flag</th><th>Action</th></tr><tr><td>08:01</td><td>Chest X-ray</td><td>Possible pneumothorax</td><td>Move up, radiologist review</td></tr><tr><td>08:06</td><td>MRI knee</td><td>None</td><td>Routine queue</td></tr></table>',notes:'Radiology is sensitive. Stay manager-level and governance-level.'},
{ch:'Chapter 5 — Radiology',a:'#0369a1',img:'radiology-ai.webp',t:'Radiology vendor questions that matter',lead:'A vendor demo is not evidence. Managers need questions that expose safety, integration and accountability.',explain:'Radiology AI tools must be evaluated on validation data, local population fit, false positives, false negatives, PACS integration, downtime process, audit logs and human override workflow.',scenario:'A vendor says, “Our AI detects abnormality with high accuracy.” The manager should ask: high accuracy on what dataset, what modality, what patient population, what threshold, and what happens when it is wrong?',example:'Useful evidence includes validation report, intended use statement, local pilot results, workflow diagram, integration plan and post-market monitoring process.',demo:'Give groups a fictional vendor claim and ask them to turn it into 10 due-diligence questions.',practice:'Write one question each for data, workflow, safety, cybersecurity and cost.',take:'Do not buy a black box for a clinical workflow.',sample:'<pre>Vendor claim: “AI reduces reporting delay by 40%.”\nQuestions:\n1. Compared with what baseline?\n2. Which modality and finding?\n3. Was this tested in hospitals like ours?\n4. How are false negatives reviewed?\n5. What logs prove the AI result and user action?</pre>',notes:'This is a practical radiology manager session.'},
{ch:'Chapter 6 — Physiotherapy',a:'#16a34a',img:'physio-ai.webp',t:'Physiotherapy AI: progress support, not therapist replacement',lead:'AI can help summarize progress, draft patient-friendly instructions and surface missing information for physiotherapist review.',explain:'Physiotherapy has many safe AI support opportunities because much of the value is in tracking, explanation and consistency. AI should not prescribe treatment independently or replace clinical assessment.',scenario:'Synthetic data shows pain score reducing from 6/10 to 3/10, home exercise completion 4/5 days, and balance confidence improving. AI summarizes progress and suggests questions for the next session, not a new treatment plan.',example:'Good AI output: “Trend improving; ask about dizziness during standing; confirm adherence barriers.” Unsafe output: “Stop current therapy and start new protocol.”',demo:'Paste synthetic physio progress data and ask AI for trend summary, missing data and patient-friendly explanation.',practice:'Participants decide which output can be shared with patient and which must stay clinician-only.',take:'AI should make progress visible, not decide therapy.',sample:'<table><tr><th>Week</th><th>Pain</th><th>Exercises done</th><th>Balance confidence</th></tr><tr><td>1</td><td>6/10</td><td>2/5</td><td>Low</td></tr><tr><td>3</td><td>3/10</td><td>4/5</td><td>Medium</td></tr></table>',notes:'This gives physio a concrete demo.'},
{ch:'Chapter 6 — Vestibular',a:'#16a34a',img:'physio-ai.webp',t:'Vestibular support: symptom diary into review questions',lead:'AI can help organize a vestibular symptom diary, but it must not diagnose vestibular conditions.',explain:'The safe task is pattern organization: triggers, duration, frequency, fall risk signals and missing questions. The clinician still performs assessment and diagnosis.',scenario:'Synthetic diary: dizziness after standing, worse in crowded supermarket, two near-falls, nausea lasting 10 minutes, no hearing change recorded. AI groups these into review points and missing questions.',example:'Safe output: “Common trigger: standing and crowded visual environment. Missing: medication changes, blood pressure, hearing symptoms, fall history detail.” Unsafe output: “Diagnosis is vestibular neuritis.”',demo:'Use vestibular diary prompt and show how AI produces clinician review questions.',practice:'Participants cross out any AI sentence that sounds like diagnosis.',take:'AI can organize patient stories; clinicians interpret them.',sample:'<pre>Diary excerpt\nMon: dizzy after standing, 5 min\nTue: supermarket dizziness, nausea 10 min\nThu: near-fall at bathroom doorway\nAI output: triggers, duration, risk signals, missing questions — no diagnosis.</pre>',notes:'This addresses the hospital’s vestibular training request while keeping boundary.'},
{ch:'Chapter 7 — Clinical AI limits',a:'#334155',img:'governance-ai.webp',t:'Clinical decision support: prediction is not permission to act',lead:'Risk prediction and CDSS can help, but they need validation, monitoring, workflow control and accountability.',explain:'A prediction score is a signal. It is not an instruction. Hospitals must decide when alerts appear, who reviews them, what evidence supports them, how bias is monitored and how alert fatigue is managed.',scenario:'A risk model flags high readmission risk. Useful response: case manager reviews discharge plan. Unsafe response: system automatically changes care plan without clinical review.',example:'Good CDSS language: “Consider review because risk factors are present.” Bad language: “Patient must receive treatment X.”',demo:'Show two AI outputs and ask which one is advisory and which one oversteps.',practice:'Participants classify CDSS examples as advisory, interruptive or unacceptable.',take:'Clinical AI needs stronger governance than office AI.',sample:'<table><tr><th>Output</th><th>Classification</th></tr><tr><td>Flag for clinician review due to missing follow-up appointment</td><td>Advisory</td></tr><tr><td>Change medication based on AI score</td><td>Unacceptable without approved clinical workflow</td></tr></table>',notes:'This prevents overreach.'},
{ch:'Chapter 8 — Vendors',a:'#0f766e',img:'vendor-ai.webp',t:'Vendor evaluation: buy controls, not just intelligence',lead:'The best AI vendor is not always the smartest model. Hospitals need privacy, audit, integration, cost control and exit plan.',explain:'Vendor evaluation should look beyond model capability. Ask how data is handled, whether prompts are used for training, where data is stored, whether SSO/MFA/RBAC is supported, what logs exist, how costs are controlled and how the hospital exits later.',scenario:'A vendor offers “free AI translation.” The hospital asks: Is data retained? Are prompts used for training? Can we disable patient data input? Is there admin control? Are logs available? What happens if contract ends?',example:'For low-risk productivity, enterprise SaaS may be enough. For sensitive workflows, private cloud or self-hosted may be considered, but only if the hospital can operate it safely.',demo:'Score a fictional vendor response using the vendor evaluation prompt.',practice:'Each group writes a “must-have” and “red flag” list for AI vendors.',take:'A cheap tool becomes expensive if it creates privacy, safety or lock-in risk.',sample:'<table><tr><th>Criterion</th><th>Question</th></tr><tr><td>Privacy</td><td>Are prompts/responses used for training?</td></tr><tr><td>Security</td><td>Does it support SSO, MFA, RBAC and audit logs?</td></tr><tr><td>Exit</td><td>Can the hospital export data and delete retained content?</td></tr></table>',notes:'Need not mention every vendor in detail on every slide; teach evaluation lens.'},
{ch:'Chapter 8 — Vendors',a:'#0f766e',img:'vendor-ai.webp',t:'How to compare OpenAI, Claude, Foundry, Bedrock, Gemini, China models and self-hosted',lead:'Use the same scorecard for every option. Do not compare only model intelligence.',explain:'The hospital should compare each option by use case fit: general drafting, long-document review, Microsoft integration, AWS governance, multimodal capability, Chinese language strength, data control and operational burden.',scenario:'Translation pilot may use enterprise SaaS with no patient identifiers. A private policy chatbot may fit Azure AI Foundry if the hospital uses Microsoft identity. A sensitive radiology workflow may require vendor-specific regulated software and formal clinical governance.',example:'Self-hosted Llama, Mistral, Qwen or DeepSeek may improve control, but the hospital owns infrastructure, patching, monitoring, access control, GPU cost and model updates.',demo:'Fill a 1–5 scorecard for three options: SaaS AI, private cloud AI and self-hosted model.',practice:'Groups choose deployment for three scenarios: patient instruction translation, internal policy chatbot, radiology triage pilot.',take:'The right platform depends on risk, data and operating capability — not hype.',sample:'<table><tr><th>Option</th><th>Best fit</th><th>Main caution</th></tr><tr><td>Enterprise SaaS</td><td>Low-risk productivity</td><td>Contract and data controls</td></tr><tr><td>Private cloud</td><td>Integrated workflows</td><td>Cloud skill and cost</td></tr><tr><td>Self-hosted</td><td>Data control</td><td>Operational burden</td></tr></table>',notes:'This addresses vendor coverage clearly.'},
{ch:'Chapter 9 — Roadmap',a:'#246bfe',img:'hero-healthcare-ai.webp',t:'The 30-60-90 day plan for a nonprofit hospital',lead:'The hospital does not need to wait for a huge investment. It can start with safe, low-cost, governed pilots.',explain:'The first 90 days should build capability: use-case register, risk scoring, prompt pack, two or three safe pilots, evidence review and a decision on what to scale. Large vendor investment should come after proof.',scenario:'Pilot 1: approved patient instruction translation. Pilot 2: SOP drafting for internal process. Pilot 3: physio progress summary from synthetic or de-identified structured data.',example:'Each pilot needs owner, risk level, data boundary, reviewer, metric, stop condition and success evidence.',demo:'Create one pilot charter live for translation workflow.',practice:'Each table drafts one pilot charter before the session ends.',take:'Small controlled wins beat expensive uncontrolled ambition.',sample:'<pre>90-day pilot charter\nUse case: Approved instruction translation\nOwner: Patient education lead\nData: approved generic text only\nReviewer: nurse educator\nMetric: time saved + review defects\nStop condition: any unsafe clinical translation defect\nDecision: scale / revise / stop</pre>',notes:'This is the answer to self-sufficiency.'},
{ch:'Closing',a:'#111827',img:'hero-healthcare-ai.webp',t:'The final operating rule',lead:'Before using AI, ask four questions: what data goes in, what output comes out, who checks it and who owns the risk?',explain:'This rule helps any staff member pause before using AI blindly. It also gives managers a simple governance language that can survive after the trainer leaves.',scenario:'If a department cannot answer the four questions, the use case is not ready. If it can answer them, it can be registered, risk-scored and piloted safely.',example:'Good AI adoption is not more tools. It is better habits: classify data, write controlled prompts, review outputs, measure pilots and learn before scaling.',demo:'Close with each group reading one safe pilot idea and one risk control.',practice:'Collect the use-case register entries and assign post-training owners.',take:'Responsible AI is how hospitals move faster without losing safety.',sample:'<pre>Four questions\n1. What data goes in?\n2. What output comes out?\n3. Who checks it?\n4. Who owns the risk?</pre>',notes:'End with a memorable rule.'}
];
const prompts={'Translation prompt':'You are a hospital patient education assistant. Translate the approved instruction into Malay, Mandarin and Tamil. Do not add new medical advice. Keep medication names unchanged. Add a final column called Terms needing human review. Text: [paste synthetic instruction]','Documentation prompt':'Convert this synthetic note into a structured handover with: Summary, Key facts, Open questions, Actions, Owner, Due date and Risk. Do not infer facts that are not stated. Note: [paste synthetic note]','SOP prompt':'Create an internal SOP draft from these process notes. Include purpose, scope, roles, steps, approvals, exceptions, audit evidence and training checklist. Put assumptions separately. Notes: [paste notes]','Radiology worklist prompt':'Use this synthetic radiology worklist. Simulate how AI abnormality flags might prioritise worklist order. This is operational simulation only, not diagnosis. Keep original arrival time visible and explain any movement. Data: [paste CSV]','Physio progress prompt':'Summarise this synthetic physiotherapy progress data for clinician review. Output: trend summary, missing data, patient-friendly explanation and questions for next session. Do not diagnose or change treatment. Data: [paste CSV]','Vestibular diary prompt':'Summarise this synthetic vestibular symptom diary. Output: common triggers, duration pattern, fall risk signals, missing questions for clinician and patient-friendly summary. Do not diagnose. Diary: [paste diary]','Vendor evaluation prompt':'Act as a hospital AI procurement reviewer. Score this vendor response 1-5 across data training, retention, SSO/MFA, audit logs, DPA, data residency, model updates, downtime, cost and exit plan. Include follow-up questions. Vendor response: [paste response]'};
const stage=document.getElementById('stage');function sec(cls,h,body){return `<div class="section ${cls||''}"><h3>${h}</h3>${body.startsWith('<')?body:`<p>${body}</p>`}</div>`}slides.forEach(s=>stage.insertAdjacentHTML('beforeend',`<section class="slide" style="--accent:${s.a}" data-ch="${s.ch}"><div class="frame"><div class="main"><span class="kicker">${s.ch}</span><h1>${s.t}</h1><p class="lead">${s.lead}</p>${sec('', 'Explain it', s.explain)}${sec('example','Hospital scenario',s.scenario)}${sec('example','Realistic example',s.example)}${sec('demo','Live demo',s.demo)}${sec('practice','Room exercise',s.practice)}${sec('take','Manager takeaway',s.take)}</div><aside class="side"><div class="visual"><img src="${A+s.img}" alt="${s.t}"></div><div class="sample">${s.sample}</div></aside></div></section>`));
const nav=document.getElementById('nav');[...new Map(slides.map(s=>[s.ch,s])).values()].forEach(s=>nav.insertAdjacentHTML('beforeend',`<button style="--c:${s.a}" data-ch="${s.ch}">${s.ch}</button>`));const slideEls=[...document.querySelectorAll('.slide')],count=document.getElementById('count'),notes=document.getElementById('notes'),noteText=document.getElementById('noteText'),drawer=document.getElementById('drawer');let i=0;function show(n){i=Math.max(0,Math.min(slideEls.length-1,n));slideEls.forEach((s,k)=>s.classList.toggle('active',k===i));count.textContent=(i+1)+' / '+slideEls.length;noteText.textContent=slides[i].notes||'';location.hash='slide-'+String(i+1).padStart(2,'0')}function next(){show(i+1)}function prev(){show(i-1)}document.getElementById('next').onclick=next;document.getElementById('prev').onclick=prev;document.getElementById('notesBtn').onclick=()=>notes.classList.toggle('open');document.getElementById('demoBtn').onclick=()=>drawer.classList.add('open');document.getElementById('closeDrawer').onclick=()=>drawer.classList.remove('open');document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{const n=slides.findIndex(s=>s.ch===b.dataset.ch);if(n>=0)show(n)});const sel=document.getElementById('promptSelect'),pre=document.getElementById('promptText');Object.keys(prompts).forEach(k=>sel.insertAdjacentHTML('beforeend',`<option>${k}</option>`));function loadPrompt(){pre.textContent=prompts[sel.value]}sel.onchange=loadPrompt;loadPrompt();document.getElementById('copyPrompt').onclick=async()=>{try{await navigator.clipboard.writeText(pre.textContent)}catch(e){}};document.addEventListener('keydown',e=>{if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();if(e.key.toLowerCase()==='n')notes.classList.toggle('open');if(e.key.toLowerCase()==='d')drawer.classList.toggle('open');if(e.key.toLowerCase()==='p')window.print()});const m=(location.hash||'').match(/slide-(\d+)/);if(m)i=Number(m[1])-1;show(i);</script></body></html>
